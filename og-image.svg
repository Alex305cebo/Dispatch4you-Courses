<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ogTruck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ogRoute" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="ogText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Route line -->
  <path d="M 100 350 Q 300 280, 500 320 T 900 280" 
        stroke="url(#ogRoute)" 
        stroke-width="8" 
        stroke-linecap="round"
        stroke-dasharray="15,10"
        fill="none"
        opacity="0.8"/>
  
  <!-- Large truck illustration -->
  <g transform="translate(750, 280)">
    <!-- Trailer -->
    <rect x="0" y="20" width="120" height="60" rx="5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="20" y1="25" x2="20" y2="75" stroke="#94a3b8" stroke-width="3"/>
    <line x1="40" y1="25" x2="40" y2="75" stroke="#94a3b8" stroke-width="3"/>
    <line x1="60" y1="25" x2="60" y2="75" stroke="#94a3b8" stroke-width="3"/>
    <line x1="80" y1="25" x2="80" y2="75" stroke="#94a3b8" stroke-width="3"/>
    <line x1="100" y1="25" x2="100" y2="75" stroke="#94a3b8" stroke-width="3"/>
    
    <!-- Cabin -->
    <rect x="120" y="15" width="80" height="65" rx="5" fill="url(#ogTruck)" stroke="#0e7490" stroke-width="3"/>
    <rect x="160" y="25" width="30" height="30" rx="3" fill="#1e3a5f" opacity="0.8"/>
    
    <!-- Wheels -->
    <circle cx="30" cy="85" r="12" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
    <circle cx="30" cy="85" r="6" fill="#475569"/>
    
    <circle cx="90" cy="85" r="12" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
    <circle cx="90" cy="85" r="6" fill="#475569"/>
    
    <circle cx="170" cy="85" r="12" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
    <circle cx="170" cy="85" r="6" fill="#475569"/>
    
    <!-- Headlight -->
    <circle cx="195" cy="50" r="4" fill="#fbbf24"/>
  </g>
  
  <!-- Location pins -->
  <g transform="translate(150, 280)">
    <path d="M 0 0 C 0 -8, -8 -16, -16 -16 C -24 -16, -32 -8, -32 0 C -32 8, -16 28, -16 28 C -16 28, 0 8, 0 0 Z" 
          fill="#10b981" 
          stroke="#059669" 
          stroke-width="2"/>
    <circle cx="-16" cy="0" r="5" fill="#fff" opacity="0.9"/>
  </g>
  
  <g transform="translate(950, 250)">
    <path d="M 0 0 C 0 -8, -8 -16, -16 -16 C -24 -16, -32 -8, -32 0 C -32 8, -16 28, -16 28 C -16 28, 0 8, 0 0 Z" 
          fill="#ef4444" 
          stroke="#dc2626" 
          stroke-width="2"/>
    <circle cx="-16" cy="0" r="5" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Main text -->
  <text x="100" y="150" font-family="'Montserrat', sans-serif" font-size="72" font-weight="900" fill="url(#ogText)" letter-spacing="2">
    DISPATCH4YOU
  </text>
  
  <text x="100" y="210" font-family="'Montserrat', sans-serif" font-size="36" font-weight="600" fill="#e2e8f0" letter-spacing="1">
    Курсы Диспетчера Грузоперевозок США
  </text>
  
  <!-- Features -->
  <g transform="translate(100, 450)">
    <text x="0" y="0" font-family="'Montserrat', sans-serif" font-size="24" font-weight="600" fill="#94a3b8">
      ✓ Обучение с нуля
    </text>
    <text x="280" y="0" font-family="'Montserrat', sans-serif" font-size="24" font-weight="600" fill="#94a3b8">
      ✓ AI-симулятор
    </text>
    <text x="540" y="0" font-family="'Montserrat', sans-serif" font-size="24" font-weight="600" fill="#94a3b8">
      ✓ Поддержка 24/7
    </text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(100, 520)">
    <text x="0" y="0" font-family="'Montserrat', sans-serif" font-size="28" font-weight="800" fill="#06b6d4">
      500+ учеников
    </text>
    <text x="280" y="0" font-family="'Montserrat', sans-serif" font-size="28" font-weight="800" fill="#06b6d4">
      $3,500 средний доход
    </text>
    <text x="640" y="0" font-family="'Montserrat', sans-serif" font-size="28" font-weight="800" fill="#06b6d4">
      4.8/5 рейтинг
    </text>
  </g>
  
  <!-- Shine effects -->
  <circle cx="200" cy="100" r="40" fill="#ffffff" opacity="0.03"/>
  <circle cx="1000" cy="150" r="60" fill="#ffffff" opacity="0.03"/>
</svg>
