name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  # ─── Определяем что изменилось ────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
      game: ${{ steps.filter.outputs.game }}
      maptrainer: ${{ steps.filter.outputs.maptrainer }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            site:
              - '*.html'
              - '*.css'
              - '*.js'
              - 'pages/**'
              - 'js/**'
              - 'css/**'
              - 'audio/**'
              - 'audio-transcripts/**'
              - 'shared-styles.css'
              - 'dark-theme.css'
              - 'dark-mode.js'
              - 'auth.js'
              - 'auth-check.js'
              - 'access-control.js'
              - '.htaccess'
              - 'Card/**'
              - '__/**'
            game:
              - 'adventure/**'
            maptrainer:
              - 'map-trainer/src/**'
              - 'map-trainer/public/**'
              - 'map-trainer/index.html'
              - 'map-trainer/vite.config.js'
              - 'map-trainer/package.json'

  # ─── 1. Статический сайт — только если изменились его файлы ───────
  deploy-site:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzrc
            --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='.kiro'
            --exclude='adventure'
            --exclude='game'
            --exclude='map-trainer/src'
            --exclude='map-trainer/node_modules'
            --exclude='map-trainer/dist'
            --exclude='map-trainer/public'
            --exclude='map-trainer/.gitignore'
            --exclude='map-trainer/eslint.config.js'
            --exclude='map-trainer/vite.config.js'
            --exclude='map-trainer/package.json'
            --exclude='map-trainer/package-lock.json'
            --exclude='node_modules'
            --exclude='*.md'
            --exclude='*.backup'
            --exclude='*.bak'
            --exclude='*.old'
            --exclude='*.albers-backup'
            --exclude='*.fixed-projection'
            --exclude='*.v2-debug'
            --exclude='Old Modules'
            --exclude='server.py'
            --exclude='package.json'
            --exclude='package-lock.json'
            --exclude='*.py'
            --exclude='*.ps1'
            --exclude='states_extracted.txt'
            --exclude='MAP_DEBUG_INSTRUCTIONS.html'
            --exclude='game-test.html'
            --exclude='test-*.html'
          path: ./
          remote_path: ~/domains/dispatch4you.com/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # ─── 2. React/Expo (game1.html) → /game/ — только если изменился adventure/ ──
  deploy-react-game:
    name: Build & deploy React game (game1)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.game == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: adventure/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: adventure

      - name: Build
        run: npx expo export --platform web
        working-directory: adventure
        env:
          NODE_ENV: production

      - name: Fix asset paths
        run: node scripts/fix-paths.js
        working-directory: adventure

      - name: Copy emoji assets to dist
        run: |
          mkdir -p adventure/dist/assets/emojis
          cp adventure/public/assets/emojis/*.webp adventure/dist/assets/emojis/

      - name: Copy truck images to dist
        run: |
          mkdir -p adventure/dist/assets/TruckPic
          mkdir -p adventure/dist/game/assets/TruckPic
          cp adventure/TruckPic/*.png adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.png adventure/dist/game/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/game/assets/TruckPic/

      - name: Copy video assets to dist
        run: |
          mkdir -p adventure/dist/assets
          mkdir -p adventure/dist/game
          cp adventure/public/Truck_loop.mp4 adventure/dist/ || true
          cp adventure/public/assets/Truck_loop.mp4 adventure/dist/assets/ || true
          cp adventure/public/game/Truck_loop.mp4 adventure/dist/game/ || true

      - name: Generate D4Y favicon
        run: node scripts/gen-favicon-ico.js
        working-directory: adventure

      - name: Add .htaccess for SPA routing
        run: |
          cat > adventure/dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /game/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Deploy to /game/
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzrc --delete
          path: adventure/dist/
          remote_path: ~/domains/dispatch4you.com/public_html/game/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # ─── 3. Map Trainer (React/Vite) → /map-trainer/ ──────────────────
  deploy-map-trainer:
    name: Build & deploy React game (map-trainer)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.maptrainer == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: map-trainer

      - name: Build
        run: npm run build
        working-directory: map-trainer
        env:
          NODE_ENV: production

      - name: Add .htaccess for map-trainer
        run: |
          cat > map-trainer/dist/.htaccess << 'EOF'
          # COOP заголовок — разрешает popup для Firebase Auth
          <IfModule mod_headers.c>
            Header always set Cross-Origin-Opener-Policy "unsafe-none"
            Header always set Cross-Origin-Embedder-Policy "unsafe-none"
          </IfModule>

          # SPA routing — все пути ведут на index.html
          Options -MultiViews
          RewriteEngine On
          RewriteBase /map-trainer/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Deploy to /map-trainer/
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzrc --delete
          path: map-trainer/dist/
          remote_path: ~/domains/dispatch4you.com/public_html/map-trainer/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
