name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  # ─── 1. Статический сайт (game2.html, pages, css, js...) ─────────
  deploy-site:
    name: Deploy static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzrc
            --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='.kiro'
            --exclude='adventure'
            --exclude='game'
            --exclude='node_modules'
            --exclude='*.md'
            --exclude='*.backup'
            --exclude='*.bak'
            --exclude='*.old'
            --exclude='*.albers-backup'
            --exclude='*.fixed-projection'
            --exclude='*.v2-debug'
            --exclude='Old Modules'
            --exclude='server.py'
            --exclude='package.json'
            --exclude='package-lock.json'
            --exclude='*.py'
            --exclude='*.ps1'
            --exclude='states_extracted.txt'
            --exclude='MAP_DEBUG_INSTRUCTIONS.html'
            --exclude='game-test.html'
            --exclude='test-*.html'
          path: ./
          remote_path: ~/domains/dispatch4you.com/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # ─── 2. React/Expo (game1.html) → /game/ ─────────────────────────
  deploy-react-game:
    name: Build & deploy React game (game1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: adventure/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: adventure

      - name: Build
        run: npx expo export --platform web
        working-directory: adventure
        env:
          NODE_ENV: production

      - name: Fix asset paths
        run: node scripts/fix-paths.js
        working-directory: adventure

      - name: Copy emoji assets to dist
        run: |
          mkdir -p adventure/dist/assets/emojis
          cp adventure/public/assets/emojis/*.webp adventure/dist/assets/emojis/

      - name: Copy truck images to dist
        run: |
          mkdir -p adventure/dist/assets/TruckPic
          mkdir -p adventure/dist/game/assets/TruckPic
          cp adventure/TruckPic/*.png adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.png adventure/dist/game/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/game/assets/TruckPic/

      - name: Copy video assets to dist
        run: |
          mkdir -p adventure/dist/assets
          cp adventure/assets/*.mp4 adventure/dist/assets/ || true

      - name: Generate D4Y favicon
        run: node scripts/gen-favicon-ico.js
        working-directory: adventure

      - name: Add .htaccess for SPA routing
        run: |
          cat > adventure/dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /game/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Deploy to /game/
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzrc --delete
          path: adventure/dist/
          remote_path: ~/domains/dispatch4you.com/public_html/game/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
