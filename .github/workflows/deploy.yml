name: 🚀 Deploy via Git SSH

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '**.py'
      - '**.ps1'
      - '**.bat'
      - '**.sh'
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Deploy to Hostinger via SSH
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      
    - name: 🚀 Deploy via SSH Git Pull
      run: |
        ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /home/${{ secrets.SSH_USERNAME }}/public_html
          git pull origin main
          echo "✅ Git pull completed successfully!"
        EOF
        
    - name: ✅ Deploy Success
      run: |
        echo "✅ Деплой завершен!"
        echo "🌐 Сайт: https://dispatch4you.com"
