name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  # ─── Определяем что изменилось ────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
      game: ${{ steps.filter.outputs.game }}
      maptrainer: ${{ steps.filter.outputs.maptrainer }}
      academy: ${{ steps.filter.outputs.academy }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            site:
              - '*.html'
              - '*.css'
              - '*.js'
              - 'pages/**'
              - 'js/**'
              - 'css/**'
              - 'audio/**'
              - 'audio-transcripts/**'
              - 'shared-styles.css'
              - 'dark-theme.css'
              - 'dark-mode.js'
              - 'auth.js'
              - 'auth-check.js'
              - 'access-control.js'
              - '.htaccess'
              - 'Card/**'
              - '__/**'
            game:
              - 'adventure/**'
            academy:
              - 'dispatch-academy-app/src/**'
              - 'dispatch-academy-app/public/**'
              - 'dispatch-academy-app/index.html'
              - 'dispatch-academy-app/vite.config.ts'
              - 'dispatch-academy-app/package.json'
            maptrainer:
              - 'map-trainer/src/**'
              - 'map-trainer/public/**'
              - 'map-trainer/level-cards/**'
              - 'map-trainer/index.html'
              - 'map-trainer/vite.config.js'
              - 'map-trainer/package.json'

  # ─── 1. Статический сайт — только если изменились его файлы ───────
  deploy-site:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync (with retry)
        run: |
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            rsync -avzrc --delete \
              --exclude='.git' --exclude='.github' --exclude='.kiro' \
              --exclude='adventure' --exclude='game' --exclude='map-trainer/' \
              --exclude='node_modules' --exclude='*.md' --exclude='*.backup' \
              --exclude='*.bak' --exclude='*.old' --exclude='*.albers-backup' \
              --exclude='*.fixed-projection' --exclude='*.v2-debug' \
              --exclude='Old Modules' --exclude='server.py' \
              --exclude='package.json' --exclude='package-lock.json' \
              --exclude='*.py' --exclude='*.ps1' --exclude='states_extracted.txt' \
              --exclude='MAP_DEBUG_INSTRUCTIONS.html' --exclude='game-test.html' \
              --exclude='test-*.html' \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
              ./ \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/dispatch4you.com/public_html/ \
              && echo "✅ Deploy successful" && exit 0
            echo "⚠️ Attempt $i failed, waiting 20s..."
            sleep 20
          done
          echo "❌ Deploy failed after 3 attempts"
          exit 1

  # ─── 2. React/Expo (game1.html) → /game/ — только если изменился adventure/ ──
  deploy-react-game:
    name: Build & deploy React game (game1)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.game == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: adventure/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: adventure

      - name: Build
        run: npx expo export --platform web
        working-directory: adventure
        env:
          NODE_ENV: production

      - name: Fix asset paths
        run: node scripts/fix-paths.js
        working-directory: adventure

      - name: Copy emoji assets to dist
        run: |
          mkdir -p adventure/dist/assets/emojis
          cp adventure/public/assets/emojis/*.webp adventure/dist/assets/emojis/

      - name: Copy truck images to dist
        run: |
          mkdir -p adventure/dist/assets/TruckPic
          mkdir -p adventure/dist/game/assets/TruckPic
          cp adventure/TruckPic/*.png adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/assets/TruckPic/
          cp adventure/TruckPic/*.png adventure/dist/game/assets/TruckPic/
          cp adventure/TruckPic/*.webp adventure/dist/game/assets/TruckPic/

      - name: Copy video assets to dist
        run: |
          mkdir -p adventure/dist/assets
          mkdir -p adventure/dist/game
          cp adventure/public/Truck_loop.mp4 adventure/dist/ || true
          cp adventure/public/assets/Truck_loop.mp4 adventure/dist/assets/ || true
          cp adventure/public/game/Truck_loop.mp4 adventure/dist/game/ || true

      - name: Generate D4Y favicon
        run: node scripts/gen-favicon-ico.js
        working-directory: adventure

      - name: Add .htaccess for SPA routing
        run: |
          cat > adventure/dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /game/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to /game/ (with retry)
        run: |
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            rsync -avzrc --delete \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
              adventure/dist/ \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/dispatch4you.com/public_html/game/ \
              && echo "✅ Deploy successful" && exit 0
            echo "⚠️ Attempt $i failed, waiting 20s..."
            sleep 20
          done
          echo "❌ Deploy failed after 3 attempts"
          exit 1

  # ─── 3. Map Trainer (React/Vite) → /map-trainer/ ──────────────────
  deploy-map-trainer:
    name: Build & deploy React game (map-trainer)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.maptrainer == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: map-trainer

      - name: Build
        run: npm run build
        working-directory: map-trainer
        env:
          NODE_ENV: production

      - name: Add .htaccess for map-trainer
        run: |
          cat > map-trainer/dist/.htaccess << 'EOF'
          # COOP заголовок — разрешает popup для Firebase Auth
          <IfModule mod_headers.c>
            Header always set Cross-Origin-Opener-Policy "unsafe-none"
            Header always set Cross-Origin-Embedder-Policy "unsafe-none"
          </IfModule>

          # SPA routing — все пути ведут на index.html
          Options -MultiViews
          RewriteEngine On
          RewriteBase /map-trainer/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: testing SSH to ${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }}..."
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo OK" 2>/dev/null; then
              echo "✅ SSH connection successful"
              exit 0
            fi
            echo "⚠️ Attempt $i failed, waiting 15s..."
            sleep 15
          done
          echo "❌ SSH connection failed after 3 attempts"
          exit 1

      - name: Deploy to /map-trainer/ (with retry)
        run: |
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            rsync -avzrc --delete --exclude='level-cards' \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
              map-trainer/dist/ \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/dispatch4you.com/public_html/map-trainer/ \
              && echo "✅ Deploy successful" && exit 0
            echo "⚠️ Attempt $i failed, waiting 20s..."
            sleep 20
          done
          echo "❌ Deploy failed after 3 attempts"
          exit 1

      - name: Deploy level-cards images (with retry)
        run: |
          for i in 1 2 3; do
            rsync -avzrc \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
              map-trainer/level-cards/ \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/dispatch4you.com/public_html/map-trainer/level-cards/ \
              && exit 0
            sleep 20
          done
          exit 1

      - name: Verify critical files are accessible
        run: |
          echo "Checking states-10m.json..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://dispatch4you.com/map-trainer/states-10m.json)
          if [ "$STATUS" != "200" ]; then
            echo "❌ CRITICAL: states-10m.json returned HTTP $STATUS — map will not render!"
            exit 1
          fi
          echo "✅ states-10m.json OK (HTTP $STATUS)"

  # ─── 4. Dispatch Academy (React/Vite) → /dispatch-academy-app/ ────
  deploy-academy:
    name: Build & deploy Dispatch Academy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.academy == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: dispatch-academy-app

      - name: Build
        run: npx vite build
        working-directory: dispatch-academy-app
        env:
          NODE_ENV: production

      - name: Add .htaccess for SPA routing
        run: |
          cat > dispatch-academy-app/dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /dispatch-academy-app/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to /dispatch-academy-app/ (with retry)
        run: |
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            rsync -avzrc --delete \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key" \
              dispatch-academy-app/dist/ \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/dispatch4you.com/public_html/dispatch-academy-app/ \
              && echo "✅ Deploy successful" && exit 0
            echo "⚠️ Attempt $i failed, waiting 20s..."
            sleep 20
          done
          echo "❌ Deploy failed after 3 attempts"
          exit 1
