name: Build & Deploy Game to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'adventure/**'

  # Ручной запуск из вкладки Actions
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adventure/package-lock.json

      - name: Install dependencies
        working-directory: adventure
        run: npm ci

      - name: Build web
        working-directory: adventure
        run: npx expo export --platform web

      - name: Deploy to Hostinger via SSH (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github'
          path: adventure/dist/
          remote_path: ~/domains/dispatch4you.com/public_html/game/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
