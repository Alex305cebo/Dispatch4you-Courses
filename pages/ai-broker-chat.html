  $('prep-scenario').textContent=d.title;
  $('prep-trailer').textContent=d.trailer;
  $('prep-route').textContent=d.route;
  $('prep-rate').textContent=d.rate;
  $('prep-avail').textContent=d.avail;
  $('prep-steps').innerHTML=d.steps.map((s,i)=>`
    <div class="prep-step">
      <div class="prep-step-num">${i+1}</div>
      <div class="prep-step-text"><b>${s.t}</b> — ${s.d}</div>
    </div>`).join('');
  $('prep-screen').style.display='flex';
}

function startCall(){
  $('prep-screen').style.display='none';
  startScenario(scen);
}

// AI COACH
// ═══════════════════════════════════════════════
let coachVisible=false;
function toggleCoach(){
  coachVisible=!coachVisible;
  $('coach-panel').classList.toggle('show',coachVisible);
}

function usePhrase(){
  const t=$('coach-phrase-text').textContent;
  if(t){textInput.value=t;textInput.dispatchEvent(new Event('input'));textInput.focus();}
}

async function coachAnalyze(userMsg, brokerMsg){
  if(!coachVisible)return;
  const prompt=`You are a dispatcher training coach. Analyze this dispatcher message in a call with broker.
Dispatcher said: "${userMsg}"
Broker responded: "${brokerMsg}"
Reply in Russian with JSON: {"score":"A/B/C/D","tip":"short tip what to improve","phrase":"better phrase to use next time"}
Keep tip under 60 chars, phrase under 80 chars. JSON only, no markdown.`;
  try{
    const r=await fetch(GU,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GK}`},
      body:JSON.stringify({model:MD,messages:[{role:'user',content:prompt}],temperature:.5,max_tokens:150})});
    const d=await r.json();
    const txt=d.choices?.[0]?.message?.content||'{}';
    const j=JSON.parse(txt.replace(/```json?|```/g,'').trim());
    $('coach-score').textContent=j.score||'—';
    $('coach-tip').innerHTML=`<b>Совет</b>${j.tip||'Хорошая работа!'}`;
    if(j.phrase){$('coach-phrase').style.display='block';$('coach-phrase-text').textContent=j.phrase;}
  }catch(e){$('coach-tip').innerHTML='<b>Совет</b>Продолжай практиковаться!';}
}

// PHRASE HINTS
// ═══════════════════════════════════════════════
const PHRASES={
  free:['This is [Name] from [Company]','Do you have loads available?','What\'s the rate?','Can you send the rate con?'],
  negotiate:['DAT shows $2.05/mile','Best I can do is $2,100','What\'s your best number?','I have another offer at $2,050'],
  book:['Can you send the rate con?','What are the pickup hours?','Driver name is [Name]','Is lumper required?'],
  problem:['I need to update you','Driver is delayed by 2 hours','We\'re working on a solution','Can we extend the delivery window?'],
  cold:['We specialize in Midwest lanes','99% on-time delivery','Can I send our carrier packet?','What lanes do you cover?'],
  followup:['We hauled your load last week','How was our service?','We have a truck available','Looking forward to working together'],
};

function showPhraseHints(val){
  const hints=$('phrase-hints');
  if(!val||val.length>30){hints.classList.remove('show');return;}
  const ph=PHRASES[scen]||PHRASES.free;
  hints.innerHTML=ph.map(p=>`<button class="ph" onclick="insertPhrase('${p.replace(/'/g,"\\'")}')">${p}</button>`).join('');
  hints.classList.add('show');
}

function insertPhrase(p){
  textInput.value=p;textInput.dispatchEvent(new Event('input'));
  $('phrase-hints').classList.remove('show');
  textInput.focus();
}

// Auto-start — show prep screen first
broker=NAMES[Math.floor(Math.random()*NAMES.length)];$('bName').textContent=`AI Брокер — ${broker}`;scen='free';
showPrepScreen();
