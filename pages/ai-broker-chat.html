<head>

    <link rel="stylesheet" href="../shared-nav.css?v=6.0.1774800000">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{overflow-x:hidden}
        :root{--primary:#06b6d4;--accent:#f97316;--success:#10b981;--danger:#ef4444;--bg:#070b14;--bg2:#0d1117;--card:#111827;--border:rgba(255,255,255,.06);--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);margin:0;height:100vh;display:flex;flex-direction:column}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 25%,rgba(6,182,212,.08),transparent 50%),radial-gradient(circle at 85% 75%,rgba(249,115,22,.05),transparent 50%);z-index:-1;pointer-events:none}

        .app{display:flex;flex-direction:column;height:100vh;max-width:760px;margin:0 auto;width:100%}

        /* HEADER */
        .hdr{padding:64px 16px 6px;background:rgba(10,14,26,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
        .hdr-row{display:flex;align-items:center;justify-content:space-between}
        .bi{display:flex;align-items:center;gap:8px}
        .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;flex-shrink:0}
        .av .dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#ef4444;border:2px solid var(--bg);transition:.3s}
        .av .dot.on{background:var(--success)}
        .bn{font-size:15px;font-weight:700}.bs{font-size:11px;color:var(--t3)}
        .hdr-btns{display:flex;gap:4px}
        .hb{padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
        .hb:hover{background:rgba(6,182,212,.12);color:var(--primary);border-color:rgba(6,182,212,.25)}

        /* SCENARIO BAR */
        .sbar{padding:4px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:4px;overflow-x:auto}
        .sbar::-webkit-scrollbar{height:0}
        .sc{padding:5px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.2s}
        .sc:hover,.sc.on{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.25);color:var(--primary)}

        /* CHAT */
        .chat{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
        .chat::-webkit-scrollbar{width:3px}
        .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

        .msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:15px;line-height:1.55;animation:fadeUp .2s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{align-self:flex-end;background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(14,165,233,.15));border:1px solid rgba(6,182,212,.15);border-bottom-right-radius:4px}
        .msg.broker{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
        .msg.broker .who{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:3px}
        .msg.sys{align-self:center;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.1);border-radius:8px;font-size:13px;color:var(--t3);text-align:center;max-width:90%;padding:6px 12px}
        .msg .ts{font-size:10px;color:var(--t3);margin-top:3px;display:block;text-align:right}
        .msg.broker .ts{text-align:left}
        .msg.broker .who{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:2px}

        /* IMPROVE BUTTON */
        .improve-row{align-self:flex-end;max-width:82%;display:flex;gap:6px;animation:fadeUp .25s ease}
        .improve-btn{padding:6px 14px;border-radius:10px;border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.08);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
        .improve-btn:hover{background:rgba(249,115,22,.18);border-color:rgba(249,115,22,.4)}
        .send-draft-btn{padding:6px 14px;border-radius:10px;border:1px solid rgba(16,185,129,.2);background:rgba(16,185,129,.08);color:var(--success);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
        .send-draft-btn:hover{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.4)}

        /* IMPROVED MSG */
        .msg.improved{align-self:flex-end;max-width:82%;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.15);border-radius:12px;font-size:14px;color:var(--accent);padding:8px 12px}
        .msg.improved .imp-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7}

        /* TYPING */
        .typing{align-self:flex-start;padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;display:none;gap:4px;align-items:center}
        .typing.show{display:flex}
        .td{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:bounce 1.4s infinite}
        .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

        /* BROKER SPEAKING INDICATOR */
        .speaking-indicator{align-self:flex-start;padding:6px 12px;border-radius:10px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.12);font-size:11px;color:var(--primary);display:none;align-items:center;gap:6px}
        .speaking-indicator.show{display:flex}
        .speaking-indicator .wave{display:flex;gap:2px;align-items:center}
        .speaking-indicator .wave span{width:3px;height:12px;background:var(--primary);border-radius:2px;animation:wave 1s infinite}
        .speaking-indicator .wave span:nth-child(2){animation-delay:.15s;height:16px}
        .speaking-indicator .wave span:nth-child(3){animation-delay:.3s;height:10px}
        @keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

        /* INPUT AREA */
        .input-area{padding:8px 12px 12px;background:rgba(10,14,26,.97);border-top:1px solid var(--border);flex-shrink:0;display:flex;justify-content:center;align-items:center}

        /* DRAFT MESSAGE with inline send */
        .msg.draft{align-self:flex-end;max-width:85%;display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(6,182,212,.15),rgba(14,165,233,.1));border:1px solid rgba(6,182,212,.2);border-bottom-right-radius:4px}
        .msg.draft .draft-text{flex:1;font-size:15px;line-height:1.5;color:var(--t1)}
        .msg.draft .draft-send{width:32px;height:32px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;margin-top:2px}
        .msg.draft .draft-send:hover{transform:scale(1.1);background:#0ea5e9}
        .mic-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--success),#059669);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;box-shadow:0 2px 8px rgba(16,185,129,.2)}
        .mic-btn:hover{transform:scale(1.06)}
        .mic-btn.rec{background:linear-gradient(135deg,var(--danger),#dc2626);box-shadow:0 2px 8px rgba(239,68,68,.25);animation:micP 1s infinite}
        @keyframes micP{0%,100%{box-shadow:0 2px 8px rgba(239,68,68,.25)}50%{box-shadow:0 2px 16px rgba(239,68,68,.4)}}
        .mic-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;animation:none}

        /* RESPONSIVE */
        @media(max-width:768px){.hdr{padding:58px 10px 5px}.av{width:30px;height:30px;font-size:13px}.bn{font-size:12px}.msg{max-width:88%;font-size:12px}.input-area{padding:5px 10px 8px}}
        @media(max-width:480px){.hdr{padding:54px 8px 4px}.hb .txt{display:none}.msg{max-width:92%;font-size:12px;padding:6px 10px}.mic-btn{width:36px;height:36px;font-size:15px}.text-input{font-size:12px;padding:6px 10px}}
    </style>
</head>

    <div id="shared-nav-container"></div>
    <div class="app">
        <div class="hdr"><div class="hdr-row">
            <div class="bi"><div class="av">🤖<span class="dot" id="dot"></span></div><div><div class="bn" id="bName">AI Брокер — Mike</div><div class="bs" id="bStat">Проверка...</div></div></div>

<script>
const _k=['gsk_7b9aEN1PMQBKSKbw','GOyoWGdyb3FYcNiq4FWZScbJ4iZYYSYOF4Qh'];
const GK=_k[0]+_k[1], GU='https://api.groq.com/openai/v1/chat/completions', MD='llama-3.3-70b-versatile';
let hist=[],scen='free',broker='Mike',busy=false,isRec=false,recognition=null,synth=window.speechSynthesis,draftText='',draftEl=null;
const NAMES=['Mike','Steve','Dave','Tom','Chris','Brian','Kevin','Jason','Mark','Jeff'];

const SC={
free:{p:`You are {N}, freight broker at Apex Freight. Phone rings — dispatcher calling. Be REAL busy broker. Direct, professional. Handle loads across US. If asked about a lane — make up realistic details. Negotiate realistically. Ask for MC#. MAX 2-3 short sentences. Phone pace. Use freight terms. Match user's language. If "подскажи"/"hint" → [HINT: tip in Russian] then continue.`,g:'{N}, Apex Freight.',h:['Представься: имя, компания, MC#','Спроси какие грузы есть','Упомяни оборудование и лейны']},
negotiate:{p:`You are {N}, broker at Summit Logistics. Dispatcher calls about your load. LOAD: Dallas TX→Atlanta GA, 780mi, 53' Dry Van, Auto parts 42K lbs, pickup tomorrow 6AM. Opening: $1,750. Market: ~$2,100. Max: $2,200 NEVER reveal/exceed. Hold 2 pushbacks. Move $50-100/round. Pressure: "I got 3 carriers", "Market's soft". NEVER accept first counter. After 4 rounds: "Final offer." MAX 2 sentences. Match language. "подскажи"→[HINT: tip in Russian].`,g:'{N}, Summit Logistics. What can I do for you?',h:['Не соглашайся на первое предложение','Скажи "Can you do any better?"','Упомяни DAT данные']},
book:{p:`You are {N}, broker at National Freight. Dispatcher calls to book. LOAD: Chicago IL→Miami FL, 1380mi, Reefer 53' 34°F, Fresh produce 38K lbs, pickup tomorrow 4AM Sysco. Rate: $3,450 (min $3,100). FLOW: Answer→MC#→load details→negotiate→driver info→email for rate con→remind check-in 2hrs before. MAX 2-3 sentences. Match language. "подскажи"→[HINT: tip in Russian].`,g:'{N}, National Freight. How can I help?',h:['Имей MC# наготове','Спроси ВСЕ детали','Дай данные водителя']},
problem:{p:`You are {N}, broker at CrossCountry. Dispatcher calls about problem with active load. LOAD IN TRANSIT: LA→Denver, 1020mi, Electronics 40K lbs, $2,800, deliver today 5PM. REACTIONS: Delay→frustrated. Breakdown→"Where? ETA repair?" Damage→"Photos NOW." Demand details, timeline, plan. Stressed — shipper waiting. MAX 2-3 sentences. Match language. "подскажи"→[HINT: tip in Russian].`,g:'{N}, CrossCountry. What\'s going on?',h:['Сообщи СРАЗУ','Дай конкретику: где, что, ETA','Предложи решение']},
cold:{p:`You are {N}, broker at Pacific Freight. Busy. Unknown dispatcher cold-calling. Skeptical but open. 20+ cold calls/day. Ask: MC#, business age, equipment, lanes, insurance. If professional→warm up. If vague→"Send packet." MAX 2 sentences. Match language. "подскажи"→[HINT: tip in Russian].`,g:'{N}, Pacific Freight. Yeah, go ahead.',h:['Будь кратким','Представься: имя, MC#, оборудование','Скажи какие лейны']},
followup:{p:`You are {N}, broker at Alliance Transport. Dispatcher worked with before calls back. Last load went well. Friendly. Have loads: Houston→Nashville 790mi $1,900 Thu, Memphis→Charlotte 630mi $1,500 Fri, Jacksonville→Atlanta 350mi Reefer $1,100 Wed. More flexible. "Keep you busy on this lane." MAX 2-3 sentences. Match language. "подскажи"→[HINT: tip in Russian].`,g:'Hey! {N} at Alliance. Good to hear from you!',h:['Напомни о прошлом грузе','Спроси о грузах','Предложи стать regular carrier']}
};

const $=id=>document.getElementById(id);
const chat=$('chat'),micBtn=$('micBtn'),textInput=$('textInput'),sendBtn=$('sendBtn'),typingEl=$('typing'),speakInd=$('speakInd');

// Init AI
(async()=>{try{const r=await fetch(GU,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GK}`},body:JSON.stringify({model:MD,messages:[{role:'user',content:'ping'}],max_tokens:5})});$('dot').classList.toggle('on',r.ok);$('bStat').textContent=r.ok?'Онлайн':'Офлайн'}catch(e){$('bStat').textContent='Офлайн'}})();

// Speech Recognition
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
recognition.onresult=e=>{let f='',i='';for(let x=e.resultIndex;x<e.results.length;x++){if(e.results[x].isFinal)f+=e.results[x][0].transcript;else i+=e.results[x][0].transcript}
if(f){stopRec();showDraft(f.trim())}else if(i&&draftEl){draftEl.querySelector('.draft-text').textContent=i}};
recognition.onerror=()=>stopRec();recognition.onend=()=>{if(isRec)stopRec()}}

// Scenario chips
document.querySelectorAll('.sc').forEach(c=>c.addEventListener('click',()=>startScenario(c.dataset.s)));

function startScenario(s){
    document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));
    document.querySelector(`.sc[data-s="${s}"]`)?.classList.add('on');
    scen=s;hist=[];broker=NAMES[Math.floor(Math.random()*NAMES.length)];
    $('bName').textContent=`AI Брокер — ${broker}`;
    chat.innerHTML='';draftEl=null;draftText='';
}

function toggleMic(){if(busy)return;isRec?stopRec():startRec()}
function startRec(){if(!recognition||busy)return;isRec=true;micBtn.classList.add('rec');
    // Create draft bubble immediately
    draftText='';draftEl=document.createElement('div');draftEl.className='msg user';draftEl.innerHTML='<span class="draft-text" style="opacity:.6">🎙️ Слушаю...</span>';chat.appendChild(draftEl);chat.scrollTop=chat.scrollHeight;
    try{recognition.start()}catch(e){}}
function stopRec(){isRec=false;micBtn.classList.remove('rec')}

function showDraft(text){
    draftText=text;
    if(draftEl){
        draftEl.className='msg draft';
        draftEl.innerHTML=`<span class="draft-text">${esc(text)}</span><button class="draft-send" onclick="sendDraft()" title="Отправить">➤</button>`;
        // Add improve button below
        const row=document.createElement('div');row.className='improve-row';row.id='draftActions';
        row.innerHTML=`<button class="improve-btn" onclick="improveDraft()">✨ Улучшить</button>`;
        chat.appendChild(row);chat.scrollTop=chat.scrollHeight
    }
}

async function improveDraft(){
    if(!draftText)return;
    const btn=document.querySelector('.improve-btn');if(btn)btn.textContent='⏳...';
    const prompt=`You are a dispatcher coach. The dispatcher said this to a freight broker:\n"${draftText}"\n\nSuggest a better, more professional version in the SAME language. Just give the improved text, nothing else. Keep it short (1-2 sentences max).`;
    try{
        const r=await fetch(GU,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GK}`},body:JSON.stringify({model:MD,messages:[{role:'user',content:prompt}],temperature:.5,max_tokens:100})});
        const d=await r.json();const improved=d.choices?.[0]?.message?.content||draftText;
        // Show improved version
        const imp=document.createElement('div');imp.className='msg improved';imp.innerHTML=`<div class="imp-label">✨ Улучшенный вариант</div>${esc(improved)}`;
        const actions=document.getElementById('draftActions');
        if(actions)actions.before(imp);
        // Update draft to use improved version
        draftText=improved;if(draftEl)draftEl.innerHTML=esc(improved)+`<span class="ts">${now()} ✨</span>`;
        // Update buttons
        if(actions)actions.innerHTML=`<button class="send-draft-btn" onclick="sendDraft()">➤ Отправить улучшенный</button>`;
        chat.scrollTop=chat.scrollHeight;
    }catch(e){if(btn)btn.textContent='✨ Улучшить'}
}

function sendDraft(){
    if(!draftText||busy)return;
    // Replace draft with sent message
    if(draftEl){draftEl.className='msg user';draftEl.innerHTML=esc(draftText)+`<span class="ts">${now()} ✓</span>`}
    document.getElementById('draftActions')?.remove();
    document.querySelectorAll('.msg.improved').forEach(e=>e.remove());
    draftEl=null;
    processMsg(draftText);draftText='';
}

function sendText(){
    const t=textInput.value.trim();if(!t||busy)return;
    textInput.value='';textInput.style.height='auto';sendBtn.disabled=true;
    addMsg('user',t);processMsg(t);
}

async function processMsg(text){
    hist.push({role:'user',content:text});busy=true;micBtn.disabled=true;sendBtn.disabled=true;
    typingEl.classList.add('show');chat.scrollTop=chat.scrollHeight;
    const reply=await callAI(text);
    typingEl.classList.remove('show');
    // Handle hints
    let brokerReply=reply;
    if(reply.includes('[HINT')){const m=reply.match(/\[HINT:?\s*(.*?)\]/);if(m){addMsg('sys','💡 '+m[1].trim());brokerReply=reply.replace(/\[HINT:?\s*.*?\]/,'').trim()}}
    addMsg('broker',brokerReply);hist.push({role:'assistant',content:brokerReply});
    await speakText(brokerReply);
    busy=false;micBtn.disabled=false;sendBtn.disabled=!textInput.value.trim();
}

async function callAI(msg){
    const sp=SC[scen].p.replace(/{N}/g,broker);
    const msgs=[{role:'system',content:sp},...hist.slice(-10)];
    const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),8000);
    try{const r=await fetch(GU,{method:'POST',mode:'cors',signal:ctrl.signal,headers:{'Content-Type':'application/json','Authorization':`Bearer ${GK}`},body:JSON.stringify({model:MD,messages:msgs,temperature:.85,max_tokens:120,top_p:.9})});clearTimeout(t);if(!r.ok)return fb();const d=await r.json();$('dot').classList.add('on');return d.choices?.[0]?.message?.content||fb()}catch(e){clearTimeout(t);return fb()}
}
const FBS=["Yeah, let me pull that up. What's your MC?","I hear you. Let me check.","What lanes you looking at?","I might have something. What equipment?","Let me see what I can do."];let fi=0;function fb(){return FBS[fi++%FBS.length]}

function speakText(text){
    return new Promise(resolve=>{
        if(!synth){resolve();return}synth.cancel();
        const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=1.05;u.pitch=.95;
        const v=synth.getVoices();const mv=v.find(x=>x.lang.startsWith('en')&&/male|david|james|mark|daniel/i.test(x.name))||v.find(x=>x.lang.startsWith('en-US'))||v.find(x=>x.lang.startsWith('en'));
        if(mv)u.voice=mv;
        speakInd.classList.add('show');
        u.onend=()=>{speakInd.classList.remove('show');resolve()};
        u.onerror=()=>{speakInd.classList.remove('show');resolve()};
        synth.speak(u);
    });
}
if(synth)synth.onvoiceschanged=()=>synth.getVoices();

function addMsg(type,text){
    const d=document.createElement('div');d.className=`msg ${type}`;
    const t=now();
    if(type==='broker')d.innerHTML=`<div class="who">${broker}</div>${esc(text)}<span class="ts">${t}</span>`;
    else if(type==='user')d.innerHTML=`${esc(text)}<span class="ts">${t} ✓</span>`;
    else d.innerHTML=text;
    chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function autoH(){}

function showHints(){const h=SC[scen]?.h||[];addMsg('sys','💡 '+h.join(' • '));chat.scrollTop=chat.scrollHeight}

async function getAnalysis(){
    if(hist.length<4){addMsg('sys','📊 Поговори ещё немного для анализа.');return}
    addMsg('sys','📊 Анализирую...');
    const tr=hist.map(m=>`${m.role==='user'?'Dispatcher':'Broker'}: ${m.content}`).join('\n');
    try{const r=await fetch(GU,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GK}`},body:JSON.stringify({model:MD,messages:[{role:'user',content:`Analyze this dispatcher-broker call. Rate dispatcher 1-10. Respond in Russian, 3-4 sentences: score, what's good, what to improve.\n\n${tr}`}],temperature:.3,max_tokens:200})});
    const d=await r.json();addMsg('sys','📊 '+( d.choices?.[0]?.message?.content||'Ошибка анализа'))}catch(e){addMsg('sys','📊 Ошибка анализа')}
    chat.scrollTop=chat.scrollHeight;
}

function resetChat(){synth?.cancel();if(recognition&&isRec)recognition.stop();isRec=false;busy=false;hist=[];draftText='';draftEl=null;chat.innerHTML='';document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));document.querySelector('.sc[data-s="free"]').classList.add('on');scen='free';broker=NAMES[Math.floor(Math.random()*NAMES.length)];$('bName').textContent=`AI Брокер — ${broker}`}

// Auto-start free scenario (empty chat)
broker=NAMES[Math.floor(Math.random()*NAMES.length)];$('bName').textContent=`AI Брокер — ${broker}`;scen='free';
</script>
