<!DOCTYPE html>
<html lang="ru" style="background:#070b14">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Статистика пользователей — Курсы Диспетчера</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared-nav.css?v=7.6">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b14;--bg2:#0f0f1e;--card:#12162a;--card2:#1a1e35;
  --border:rgba(255,255,255,.07);--primary:#667eea;--secondary:#764ba2;
  --accent:#f093fb;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--info:#3b82f6;
  --text:#e2e8f0;--muted:#64748b;--t1:#ffffff;--t2:#e2e8f0;--t3:#94a3b8
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 20%,rgba(102,126,234,.08),transparent 55%),
  radial-gradient(ellipse at 85% 80%,rgba(118,75,162,.06),transparent 55%);
  z-index:-1;pointer-events:none}
.wrap{max-width:1300px;margin:0 auto;padding:0 20px}

/* Hero */
.hero{padding:16px 0 12px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:20px}
.hero h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:13px;color:var(--muted);margin-top:4px}

/* Overview Cards */
.ov-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;
  position:relative;overflow:hidden}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.ov-card:nth-child(1)::before{background:var(--primary)}.ov-card:nth-child(2)::before{background:var(--ok)}
.ov-card:nth-child(3)::before{background:var(--info)}.ov-card:nth-child(4)::before{background:var(--warn)}
.ov-card:nth-child(5)::before{background:var(--accent)}.ov-card:nth-child(6)::before{background:var(--err)}
.ov-ico{font-size:18px;margin-bottom:2px}
.ov-val{font-size:20px;font-weight:900;color:var(--t1);line-height:1.1}
.ov-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;font-weight:600}

/* 2-col: Chart + Leaderboard */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;overflow:hidden}
.sec-title{font-size:13px;font-weight:800;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-tabs{display:flex;gap:4px;margin-left:auto}
.sec-tab{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.sec-tab.on{background:rgba(102,126,234,.15);border-color:rgba(102,126,234,.3);color:var(--primary)}

/* Chart type buttons */
.chart-type-btns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ct-btn{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);
  color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  position:relative;overflow:hidden}
.ct-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.04));opacity:0;transition:opacity .3s}
.ct-btn:hover{border-color:rgba(102,126,234,.25);color:var(--t2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.ct-btn:hover::before{opacity:1}
.ct-btn.active{background:linear-gradient(135deg,rgba(102,126,234,.18),rgba(118,75,162,.14));
  border-color:rgba(102,126,234,.45);color:#a5b4fc;box-shadow:0 0 20px rgba(102,126,234,.15),inset 0 1px 0 rgba(255,255,255,.06)}
.ct-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);border-radius:2px}

/* Chart card premium */
#chart-card{position:relative;overflow:hidden}
#chart-card::before{content:'';position:absolute;top:-50%;right:-30%;width:300px;height:300px;
  background:radial-gradient(circle,rgba(102,126,234,.06),transparent 70%);pointer-events:none;transition:all .5s}
.chart-summary{display:flex;gap:12px;margin-bottom:12px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px}
.chart-stat{flex:1;text-align:center}
.chart-stat-val{font-size:18px;font-weight:900;line-height:1}
.chart-stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.chart-canvas-wrap{position:relative;border-radius:10px;padding:4px;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.04)}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;transition:.2s;cursor:pointer}
.lb-row:hover{background:rgba(255,255,255,.04)}
.lb-rank{width:24px;font-size:14px;font-weight:900;text-align:center;flex-shrink:0}
.lb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;flex-shrink:0;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
.lb-name{font-size:13px;font-weight:600;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-val{font-size:13px;font-weight:800;color:var(--primary);min-width:50px;text-align:right}

/* Controls */
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.ctrl-srch{flex:1;min-width:180px;position:relative}
.ctrl-srch input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:.2s}
.ctrl-srch input:focus{border-color:rgba(102,126,234,.4)}
.ctrl-srch input::placeholder{color:var(--muted)}
.ctrl-srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.ctrl select{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--t2);font-size:12px;font-family:inherit;cursor:pointer;outline:none}
.ctrl-count{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.btn-csv{padding:8px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--ok),#059669);
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-csv:hover{opacity:.85;transform:translateY(-1px)}
.btn-csv:disabled{opacity:.4;cursor:not-allowed;transform:none}
</style>

<style>
/* User Cards Grid */
.uc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.uc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden}
.uc:hover{border-color:rgba(102,126,234,.3);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.uc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.uc-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;
  overflow:hidden}
.uc-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.uc-info{flex:1;min-width:0}
.uc-name{font-size:11px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uc-email{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uc-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.role-badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700}
.role-1{background:rgba(148,163,184,.15);color:#e2e8f0}
.role-2{background:rgba(100,116,139,.15);color:#e2e8f0}
.role-3{background:rgba(34,197,94,.15);color:#4ade80}
.role-4{background:rgba(20,184,166,.15);color:#2dd4bf}
.role-5{background:rgba(59,130,246,.15);color:#60a5fa}
.role-6{background:rgba(99,102,241,.15);color:#818cf8}
.role-7{background:rgba(168,85,247,.15);color:#c084fc}
.role-8{background:rgba(236,72,153,.15);color:#f472b6}
.role-9{background:rgba(245,158,11,.15);color:#fbbf24}
.role-10{background:rgba(239,68,68,.15);color:#f87171}
.uc-xp{font-size:10px;font-weight:800;color:var(--warn)}
.uc-bars{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.uc-bar{display:flex;align-items:center;gap:4px}
.uc-bar-lbl{font-size:8px;color:var(--muted);width:46px;flex-shrink:0;font-weight:600}
.uc-bar-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.uc-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.uc-bar-val{font-size:8px;color:var(--t3);width:28px;text-align:right;font-weight:600;flex-shrink:0}
.uc-foot{display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--muted)}
.uc-streak{color:var(--warn);font-weight:700}
.uc-acc{color:var(--ok);font-weight:700}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:.3s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(102,126,234,.2);border-radius:20px;
  max-width:700px;width:100%;max-height:88vh;overflow-y:auto;
  transform:scale(.95);transition:.3s}
.modal-ov.open .modal{transform:scale(1)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:rgba(102,126,234,.3);border-radius:4px}
.modal-head{padding:20px 20px 0;display:flex;align-items:center;gap:14px}
.modal-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;
  flex-shrink:0;overflow:hidden}
.modal-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.modal-info{flex:1}
.modal-name{font-size:18px;font-weight:800;color:var(--t1)}
.modal-email{font-size:12px;color:var(--muted)}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:16px;flex-shrink:0;transition:.2s}
.modal-close:hover{background:rgba(239,68,68,.15);color:#ef4444}
.modal-body{padding:16px 20px 20px}
.modal-section{margin-bottom:14px}
.modal-sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.modal-stat{text-align:center;padding:10px 6px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px}
.modal-stat-val{font-size:18px;font-weight:900;color:var(--t1);line-height:1}
.modal-stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600}
.modal-progress-list{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.modal-progress-item{font-size:11px;padding:4px 6px;border-radius:6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);display:flex;align-items:center;gap:4px}
.modal-progress-item.done{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}
.modal-progress-item .check{font-size:10px}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:40px;color:var(--err)}
.error-box button{margin-top:12px;padding:8px 20px;border-radius:8px;border:none;
  background:var(--primary);color:#fff;font-weight:700;cursor:pointer;font-family:inherit}
.no-access{text-align:center;padding:80px 20px;color:var(--muted);font-size:16px}
.lb-me{background:rgba(102,126,234,.08);border:1px solid rgba(102,126,234,.15);border-radius:10px}

/* Responsive */
@media(max-width:1400px){
  .uc-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:1024px){
  .ov-grid{grid-template-columns:repeat(3,1fr)}
  .uc-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .wrap{padding:0 10px}
  .ov-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .mid-row{grid-template-columns:1fr;gap:10px}
  .uc-grid{grid-template-columns:repeat(2,1fr)}
  .ctrl{flex-direction:column;align-items:stretch;gap:6px}
  .ctrl-srch{min-width:auto}
  .modal{border-radius:16px;max-height:95vh}
  .modal-stats{grid-template-columns:repeat(2,1fr)}
  .modal-progress-list{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:20px}
}
@media(max-width:480px){
  .ov-grid{grid-template-columns:1fr 1fr;gap:6px}
  .ov-val{font-size:18px}
  .uc-grid{grid-template-columns:1fr}
  .modal-stats{grid-template-columns:repeat(2,1fr)}
  .modal-progress-list{grid-template-columns:1fr}
}
</style>

<script type="module" src="../firebase-auth-init.js?v=4.0"></script>
<script src="../role-guard.js"></script>
</head>
<body>
<div id="nav-placeholder"></div>
<script src="../nav-loader.js?v=7.4"></script>

<div class="wrap" id="main-content" style="display:none">
  <!-- Hero -->
  <div class="hero">
    <h1>📊 Статистика пользователей</h1>
    <p>Аналитика и прогресс всех студентов платформы</p>
  </div>

  <!-- Overview -->
  <div class="ov-grid" id="overview-grid">
    <div class="ov-card"><div class="ov-ico">👥</div><div class="ov-val" id="ov-total">—</div><div class="ov-lbl">Всего</div></div>
    <div class="ov-card"><div class="ov-ico">🟢</div><div class="ov-val" id="ov-7d">—</div><div class="ov-lbl">Активных 7д</div></div>
    <div class="ov-card"><div class="ov-ico">📊</div><div class="ov-val" id="ov-30d">—</div><div class="ov-lbl">Активных 30д</div></div>
    <div class="ov-card"><div class="ov-ico">⚡</div><div class="ov-val" id="ov-xp">—</div><div class="ov-lbl">Средний XP</div></div>
    <div class="ov-card"><div class="ov-ico">📚</div><div class="ov-val" id="ov-prog">—</div><div class="ov-lbl">Ср. прогресс</div></div>
    <div class="ov-card"><div class="ov-ico">🔥</div><div class="ov-val" id="ov-streak">—</div><div class="ov-lbl">Ср. streak</div></div>
  </div>

  <!-- Chart + Leaderboard -->
  <div class="mid-row">
    <div class="sec-card" id="chart-card">
      <div class="sec-title">
        <span id="chart-icon">📈</span> <span id="chart-label">Активность</span>
        <div class="sec-tabs" id="chart-period-tabs">
          <button class="sec-tab on" onclick="setChartPeriod(7)">7д</button>
          <button class="sec-tab" onclick="setChartPeriod(30)">30д</button>
          <button class="sec-tab" onclick="setChartPeriod(90)">90д</button>
        </div>
      </div>
      <div class="chart-type-btns" id="chart-type-btns">
        <button class="ct-btn active" data-type="activity" onclick="setChartType('activity')">👥 Активность</button>
        <button class="ct-btn" data-type="xp" onclick="setChartType('xp')">⚡ XP рост</button>
        <button class="ct-btn" data-type="newusers" onclick="setChartType('newusers')">🆕 Новые</button>
        <button class="ct-btn" data-type="lessons" onclick="setChartType('lessons')">📚 Уроки</button>
      </div>
      <div class="chart-summary" id="chart-summary">
        <div class="chart-stat"><div class="chart-stat-val" id="cs-max" style="color:#667eea">—</div><div class="chart-stat-lbl">Макс</div></div>
        <div class="chart-stat"><div class="chart-stat-val" id="cs-avg" style="color:#10b981">—</div><div class="chart-stat-lbl">Среднее</div></div>
        <div class="chart-stat"><div class="chart-stat-val" id="cs-total" style="color:#f59e0b">—</div><div class="chart-stat-lbl">Всего</div></div>
        <div class="chart-stat"><div class="chart-stat-val" id="cs-trend" style="color:#ec4899">—</div><div class="chart-stat-lbl">Тренд</div></div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="activity-chart" height="200"></canvas>
      </div>
    </div>
    <div class="sec-card">
      <div class="sec-title">🏆 Лидерборд
        <div class="sec-tabs">
          <button class="sec-tab on" onclick="setLbCrit('xp')">XP</button>
          <button class="sec-tab" onclick="setLbCrit('streak')">Streak</button>
          <button class="sec-tab" onclick="setLbCrit('progress')">Прогресс</button>
        </div>
      </div>
      <div id="leaderboard"></div>
    </div>
  </div>

  <!-- Controls (admin only) -->
  <div class="ctrl admin-only">
    <div class="ctrl-srch"><span class="ctrl-srch-ic">🔍</span>
      <input type="text" id="search-input" placeholder="Поиск по имени или email..." oninput="applyFilters()">
    </div>
    <select id="filter-level" onchange="applyFilters()"><option value="">Все уровни</option></select>
    <select id="filter-activity" onchange="applyFilters()">
      <option value="">Все</option><option value="7d">Активные 7д</option>
      <option value="30d">Активные 30д</option><option value="inactive">Неактивные</option>
    </select>
    <select id="sort-by" onchange="applyFilters()">
      <option value="xp-desc">XP ↓</option><option value="xp-asc">XP ↑</option>
      <option value="activity">Активность</option><option value="progress">Прогресс</option>
      <option value="registered">Регистрация</option><option value="streak">Streak</option>
    </select>
    <span class="ctrl-count" id="result-count"></span>
    <button class="btn-csv" id="csv-btn" onclick="exportCSV()" disabled>📥 CSV</button>
  </div>

  <!-- User Cards (admin only) -->
  <div class="uc-grid admin-only" id="users-grid"></div>

  <!-- My Stats Card (regular users) -->
  <div id="my-stats-card" style="display:none"></div>
</div>

<!-- Loading -->
<div id="loading-state" class="loading"><div class="spinner"></div>Загрузка данных...</div>
<div id="error-state" class="error-box" style="display:none">❌ Ошибка загрузки<br><button onclick="loadData()">Повторить</button></div>
<div id="no-access" class="no-access" style="display:none">🔒 Нет доступа. Войдите в аккаунт.</div>

<!-- Modal -->
<div class="modal-ov" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

  {level:9,minXP:2500,label:'🦅 Ветеран'},{level:10,minXP:9999,label:'👑 Администратор'}
];
function getLvl(xp){let c=LEVELS[0];for(const l of LEVELS){if(xp>=l.minXP)c=l;else break;}return c;}
function getNext(xp){for(const l of LEVELS){if(xp<l.minXP)return l;}return null;}

// ═══ AUTH CHECK ═══
onAuthStateChanged(auth,async(user)=>{

  currentUserId=user.uid;
  try{

    const uDoc=await getDocFn(docRef(db,'users',user.uid));

// ═══ LOAD DATA ═══
window.loadData=async function(){
  document.getElementById('loading-state').style.display='block';
  document.getElementById('error-state').style.display='none';
  document.getElementById('main-content').style.display='none';
  try{
    const snap=await getDocs(collection(db,'users'));
    allUsers=[];
    snap.forEach(d=>{
      const data=d.data();
      const xp=data.xp||0;
      const stats=data.stats||{};
      const ts=data.trainerStats||{};
      const lvl=getLvl(xp);
      const next=getNext(xp);
      const totalAns=(stats.totalAnswers||0)+(ts.totalAnswers||0);
      const correctAns=(stats.correctAnswers||0)+(ts.correctAnswers||0);
      const knownCards=(ts.known||[]).length||(stats.knownCards||0);
      const readCases=(ts.readCases||[]).length||(stats.readCases||0);
      let la=null;
      try{la=data.lastActivity?.toDate?data.lastActivity.toDate():data.lastActivity?new Date(data.lastActivity):null;}catch(e){}
      let ca=null;
      try{ca=data.createdAt?.toDate?data.createdAt.toDate():data.createdAt?new Date(data.createdAt):null;}catch(e){}
      allUsers.push({
        id:d.id,
        name:data.displayName||data.firstName&&data.lastName?`${data.firstName} ${data.lastName}`:data.email||d.id,
        email:data.email||'',
        photoURL:data.photoURL||null,
        xp,role:data.role||1,level:lvl,nextLevel:next,
        courseProgress:stats.completedLessons?.length||stats.lessonsRead||0,
        moduleProgress:stats.completedModules?.length||stats.moduleComplete||0,
        caseProgress:readCases,
        cardProgress:knownCards,
        accuracy:totalAns>0?Math.round(correctAns/totalAns*100):0,
        totalAnswers:totalAns,
        loginStreak:data.loginStreak||0,
        maxStreak:data.maxStreak||data.loginStreak||0,
        lastActivity:la,createdAt:ca,
        xpHistory:data.xpHistory||[]
      });
    });
    // Populate level filter
    const sel=document.getElementById('filter-level');
    sel.innerHTML='<option value="">Все уровни</option>';
    LEVELS.forEach(l=>{sel.innerHTML+=`<option value="${l.level}">${l.label}</option>`;});
    document.getElementById('loading-state').style.display='none';
    document.getElementById('main-content').style.display='block';
    renderOverview();renderChart();renderLeaderboard();
    if(isSuperuser){applyFilters();}
    renderMyStats();
  }catch(e){
    console.error(e);
    document.getElementById('loading-state').style.display='none';
    document.getElementById('error-state').style.display='block';
  }
};

// ═══ OVERVIEW ═══
function renderOverview(){
  const now=Date.now();
  const d7=7*864e5,d30=30*864e5;
  const a7=allUsers.filter(u=>u.lastActivity&&(now-u.lastActivity.getTime())<d7).length;
  const a30=allUsers.filter(u=>u.lastActivity&&(now-u.lastActivity.getTime())<d30).length;
  const avgXP=allUsers.length?Math.round(allUsers.reduce((s,u)=>s+u.xp,0)/allUsers.length):0;
  const avgProg=allUsers.length?Math.round(allUsers.reduce((s,u)=>s+(u.courseProgress/15*100),0)/allUsers.length):0;
  const avgStr=allUsers.length?(allUsers.reduce((s,u)=>s+u.loginStreak,0)/allUsers.length).toFixed(1):0;
  document.getElementById('ov-total').textContent=allUsers.length;
  document.getElementById('ov-7d').textContent=a7;
  document.getElementById('ov-30d').textContent=a30;
  document.getElementById('ov-xp').textContent=avgXP;
  document.getElementById('ov-prog').textContent=avgProg+'%';
  document.getElementById('ov-streak').textContent=avgStr;
}

const CHART_CFG={
  activity:{icon:'📈',label:'Активность',color:'#667eea',color2:'#818cf8',yLabel:'Пользователей'},
  xp:{icon:'⚡',label:'XP рост',color:'#f59e0b',color2:'#fbbf24',yLabel:'Средний XP'},

window.setChartPeriod=function(p){
  chartPeriod=p;

  event.target.classList.add('on');
  renderChart();

function getChartData(type,days,offset){
  const now=new Date();const r=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i-offset);
    const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(),e=s+864e5;
    if(type==='activity')r.push(allUsers.filter(u=>u.lastActivity&&u.lastActivity.getTime()>=s&&u.lastActivity.getTime()<e).length);
    else if(type==='xp'){const a=allUsers.filter(u=>u.lastActivity&&u.lastActivity.getTime()>=s&&u.lastActivity.getTime()<e);r.push(a.length?Math.round(a.reduce((x,u)=>x+u.xp,0)/a.length):0);}
    else if(type==='newusers')r.push(allUsers.filter(u=>u.createdAt&&u.createdAt.getTime()>=s&&u.createdAt.getTime()<e).length);
    else{const a=allUsers.filter(u=>u.lastActivity&&u.lastActivity.getTime()>=s&&u.lastActivity.getTime()<e);r.push(a.reduce((x,u)=>x+u.courseProgress,0));}
  }return r;
}
function renderChart(){
  if(typeof Chart==='undefined')return;
  const now=new Date();const labels=[];const cfg=CHART_CFG[chartType];
  for(let i=chartPeriod-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('ru',{day:'numeric',month:'short'}));}
  const data=getChartData(chartType,chartPeriod,0);
  const prev=getChartData(chartType,chartPeriod,chartPeriod);
  const maxV=Math.max(...data,0),avgV=data.length?Math.round(data.reduce((a,b)=>a+b,0)/data.length):0,totalV=data.reduce((a,b)=>a+b,0);
  const prevT=prev.reduce((a,b)=>a+b,0),trendPct=prevT>0?Math.round((totalV-prevT)/prevT*100):0;
  document.getElementById('cs-max').textContent=maxV;document.getElementById('cs-max').style.color=cfg.color;
  document.getElementById('cs-avg').textContent=avgV;document.getElementById('cs-total').textContent=totalV;
  document.getElementById('cs-trend').textContent=(trendPct>=0?'+':'')+trendPct+'%';
  document.getElementById('cs-trend').style.color=trendPct>=0?'#10b981':'#ef4444';
  if(actChart)actChart.destroy();
  const ctx=document.getElementById('activity-chart').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,220);g.addColorStop(0,cfg.color+'25');g.addColorStop(0.6,cfg.color+'08');g.addColorStop(1,'transparent');
  actChart=new Chart(ctx,{type:'line',
    data:{labels,datasets:[
      {label:'Текущий',data,borderColor:cfg.color,backgroundColor:g,fill:true,tension:.4,borderWidth:2.5,
        pointRadius:chartPeriod>30?0:4,pointHoverRadius:7,pointBackgroundColor:cfg.color,
        pointBorderColor:'#12162a',pointBorderWidth:2,pointHoverBackgroundColor:'#fff',pointHoverBorderColor:cfg.color,pointHoverBorderWidth:3},
      {label:'Пред. период',data:prev,borderColor:'#ec489960',backgroundColor:'transparent',fill:false,
        tension:.4,borderWidth:1.5,borderDash:[6,4],pointRadius:0,pointHoverRadius:4,
        pointHoverBackgroundColor:'#ec4899',pointHoverBorderColor:'#12162a'}
    ]},
    plugins:[{id:'glow',beforeDatasetsDraw(ch){
      const m=ch.getDatasetMeta(0);if(!m.data.length)return;const c=ch.ctx;c.save();
      c.shadowColor=cfg.color+'50';c.shadowBlur=14;c.shadowOffsetY=3;c.beginPath();
      m.data.forEach((pt,i)=>{if(i===0)c.moveTo(pt.x,pt.y);else{const p=m.data[i-1];const cx=(p.x+pt.x)/2;c.bezierCurveTo(cx,p.y,cx,pt.y,pt.x,pt.y);}});
      c.strokeStyle=cfg.color+'35';c.lineWidth=8;c.stroke();c.restore();
    }}],
    options:{responsive:true,maintainAspectRatio:true,
      animation:{duration:1200,easing:'easeInOutQuart'},
      transitions:{active:{animation:{duration:300}}},
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:'rgba(10,12,28,.96)',titleColor:'#94a3b8',bodyColor:'#fff',
          borderColor:cfg.color+'60',borderWidth:1,padding:{top:10,bottom:10,left:14,right:14},
          cornerRadius:12,displayColors:true,boxWidth:8,boxHeight:8,boxPadding:4,
          titleFont:{weight:'600',size:11,family:'Inter'},bodyFont:{size:13,weight:'700',family:'Inter'},
          callbacks:{title(it){return it[0].label},label(c2){return(c2.datasetIndex===0?cfg.yLabel:'Пред.')+': '+c2.parsed.y}}}},
      scales:{
        x:{ticks:{color:'#475569',font:{size:10,weight:'500'},maxTicksLimit:chartPeriod>30?8:chartPeriod},grid:{color:'rgba(255,255,255,.03)',drawBorder:false},border:{display:false}},
        y:{beginAtZero:true,ticks:{color:'#475569',font:{size:10,weight:'500'},padding:8},grid:{color:'rgba(255,255,255,.04)',drawBorder:false},border:{display:false}}
      }
    }
  });
}

window.setLbCrit=function(c){
  lbCrit=c;
  document.querySelectorAll('.sec-card:last-child .sec-tab').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  renderLeaderboard();
};
function renderLeaderboard(){
  const sorted=[...allUsers].sort((a,b)=>{
    if(lbCrit==='xp')return b.xp-a.xp;
    if(lbCrit==='streak')return b.loginStreak-a.loginStreak;
    const pa=(a.courseProgress/15+a.moduleProgress/12+a.caseProgress/50+a.cardProgress/80)/4*100;
    const pb=(b.courseProgress/15+b.moduleProgress/12+b.caseProgress/50+b.cardProgress/80)/4*100;
    return pb-pa;
  }).slice(0,10);
  const medals=['🥇','🥈','🥉'];
  document.getElementById('leaderboard').innerHTML=sorted.map((u,i)=>{
    const val=lbCrit==='xp'?u.xp+' XP':lbCrit==='streak'?u.loginStreak+'🔥':
      Math.round((u.courseProgress/15+u.moduleProgress/12+u.caseProgress/50+u.cardProgress/80)/4*100)+'%';
    const displayName=isSuperuser?u.name:(u.id===currentUserId?u.name+'  ⭐':(u.name.split(' ')[0]||(u.name||'?').charAt(0).toUpperCase()));
    const clickAttr=isSuperuser?`onclick="openModal('${u.id}')"`:u.id===currentUserId?`onclick="openModal('${u.id}')"`:'';
    const isMe=u.id===currentUserId?' lb-me':'';
    return`<div class="lb-row${isMe}" ${clickAttr} ${!clickAttr?'style="cursor:default"':''}>
      <div class="lb-rank">${i<3?medals[i]:(i+1)}</div>
      <div class="lb-av">${u.photoURL&&isSuperuser?`<img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(u.name||'?')[0].toUpperCase()}</div>
      <div class="lb-name">${displayName}</div>
      <span class="role-badge role-${u.role}">${u.level.label}</span>
      <div class="lb-val">${val}</div>
    </div>`;
  }).join('');
}

// ═══ FILTER & SORT ═══
window.applyFilters=function(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const lvl=document.getElementById('filter-level').value;
  const act=document.getElementById('filter-activity').value;
  const sort=document.getElementById('sort-by').value;
  const now=Date.now();
  filteredUsers=allUsers.filter(u=>{
    if(q&&!u.name.toLowerCase().includes(q)&&!u.email.toLowerCase().includes(q))return false;
    if(lvl&&u.level.level!==+lvl)return false;
    if(act==='7d'&&(!u.lastActivity||now-u.lastActivity.getTime()>7*864e5))return false;
    if(act==='30d'&&(!u.lastActivity||now-u.lastActivity.getTime()>30*864e5))return false;
    if(act==='inactive'&&u.lastActivity&&now-u.lastActivity.getTime()<30*864e5)return false;
    return true;
  });
  filteredUsers.sort((a,b)=>{
    if(sort==='xp-desc')return b.xp-a.xp;
    if(sort==='xp-asc')return a.xp-b.xp;
    if(sort==='activity')return(b.lastActivity?.getTime()||0)-(a.lastActivity?.getTime()||0);
    if(sort==='streak')return b.loginStreak-a.loginStreak;
    if(sort==='registered')return(b.createdAt?.getTime()||0)-(a.createdAt?.getTime()||0);
    const pa=(a.courseProgress/15+a.moduleProgress/12+a.caseProgress/50+a.cardProgress/80)/4;
    const pb=(b.courseProgress/15+b.moduleProgress/12+b.caseProgress/50+b.cardProgress/80)/4;
    return pb-pa;
  });
  document.getElementById('result-count').textContent=`Показано ${filteredUsers.length} из ${allUsers.length}`;
  document.getElementById('csv-btn').disabled=!filteredUsers.length;
  renderCards();
};

              <div style="height:100%;width:${pct}%;background:${b.color};border-radius:6px"></div>
            </div>
            <span style="font-size:11px;color:var(--t3);width:40px;text-align:right;font-weight:600">${b.val}/${b.max}</span>
          </div>`;}).join('')}
      </div>
    </div>`;
}

// ═══ MODAL ═══
window.openModal=function(id){
  // Regular users can only view their own profile
  if(!isSuperuser&&id!==currentUserId)return;
  const u=allUsers.find(x=>x.id===id);if(!u)return;
  const fmtDate=d=>d?d.toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'}):'-';
  const fmtTime=d=>d?d.toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'-';
  const nextXP=u.nextLevel?u.nextLevel.minXP:u.xp;
  const prevXP=u.level.minXP;
  const progPct=nextXP>prevXP?Math.round((u.xp-prevXP)/(nextXP-prevXP)*100):100;
  const lessons=['Введение','Глоссарий','Роль','Оборудование','Маршруты','Load Boards','Переговоры','Брокеры','Документы','Законы','TMS','Коммуникация','Проблемы','Финансы','Карьера'];
  const modules=['Индустрия','Термины','Диспетчер','Load Boards','Маршруты','Оборудование','Переговоры','Брокеры','CSA','Грузы','Проблемы','Карьера'];

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-head">
      <div class="modal-av">${u.photoURL?`<img src="${u.photoURL}">`:(u.name||'?')[0].toUpperCase()}</div>
      <div class="modal-info">
        <div class="modal-name">${u.name}</div>
        <div class="modal-email">${isSuperuser?(u.email+' · Рег: '+fmtDate(u.createdAt)):('Рег: '+fmtDate(u.createdAt))}</div>
      </div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-sec-title">📊 Основные метрики</div>
        <div class="modal-stats">
          <div class="modal-stat"><div class="modal-stat-val" style="color:var(--warn)">⚡${u.xp}</div><div class="modal-stat-lbl">XP</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${u.level.label.split(' ')[0]}</div><div class="modal-stat-lbl">Ур. ${u.level.level}</div></div>
          <div class="modal-stat"><div class="modal-stat-val" style="color:var(--ok)">${u.accuracy}%</div><div class="modal-stat-lbl">Точность</div></div>
          <div class="modal-stat"><div class="modal-stat-val" style="color:#f97316">🔥${u.loginStreak}</div><div class="modal-stat-lbl">Streak</div></div>
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden">
            <div style="height:100%;width:${progPct}%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:6px"></div>
          </div>
          <span style="font-size:10px;color:var(--muted)">${u.nextLevel?u.xp+'/'+u.nextLevel.minXP+' XP':'MAX'}</span>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-sec-title">📚 Уроки курса (${u.courseProgress}/15)</div>
        <div class="modal-progress-list">
          ${lessons.map((l,i)=>`<div class="modal-progress-item ${i<u.courseProgress?'done':''}"><span class="check">${i<u.courseProgress?'✅':'⬜'}</span>${l}</div>`).join('')}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-sec-title">📝 Модули (${u.moduleProgress}/12)</div>
        <div class="modal-progress-list">
          ${modules.map((m,i)=>`<div class="modal-progress-item ${i<u.moduleProgress?'done':''}"><span class="check">${i<u.moduleProgress?'✅':'⬜'}</span>${m}</div>`).join('')}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-stats" style="grid-template-columns:repeat(4,1fr)">
          <div class="modal-stat"><div class="modal-stat-val">${u.caseProgress}</div><div class="modal-stat-lbl">Кейсов/50</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${u.cardProgress}</div><div class="modal-stat-lbl">Карточек/80</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${u.totalAnswers}</div><div class="modal-stat-lbl">Ответов</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${u.maxStreak}</div><div class="modal-stat-lbl">Макс streak</div></div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">
        Последняя активность: ${fmtTime(u.lastActivity)}
      </div>
      ${u.xpHistory.length?`<div class="modal-section" style="margin-top:12px">
        <div class="modal-sec-title">📈 Динамика XP</div>
        <canvas id="xp-mini-chart" height="120"></canvas>
      </div>`:''}
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  if(u.xpHistory.length)renderXPChart(u.xpHistory);
};
window.closeModal=function(){document.getElementById('modal-overlay').classList.remove('open');};

function renderXPChart(history){
  if(typeof Chart==='undefined')return;
  const sorted=[...history].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  let cum=0;const labels=[];const data=[];
  sorted.forEach(h=>{cum+=h.xp;labels.push(new Date(h.ts).toLocaleDateString('ru',{day:'numeric',month:'short'}));data.push(cum);});
  new Chart(document.getElementById('xp-mini-chart'),{
    type:'line',data:{labels,datasets:[{data,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.1)',
      fill:true,tension:.4,pointRadius:1,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#64748b',font:{size:9},maxTicksLimit:6},grid:{display:false}},
        y:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

// ═══ CSV EXPORT ═══
window.exportCSV=function(){
  if(!filteredUsers.length)return;
  const fmtD=d=>d?d.toLocaleDateString('ru'):'';
  const hdr='Имя,Email,Уровень,XP,Курс %,Модули %,Кейсы %,Карточки %,Streak,Точность %,Последняя активность,Регистрация';
  const rows=filteredUsers.map(u=>[
    `"${u.name}"`,`"${u.email}"`,`"${u.level.label}"`,u.xp,
    Math.round(u.courseProgress/15*100),Math.round(u.moduleProgress/12*100),
    Math.round(u.caseProgress/50*100),Math.round(u.cardProgress/80*100),
    u.loginStreak,u.accuracy,fmtD(u.lastActivity),fmtD(u.createdAt)
  ].join(','));
  const csv='\uFEFF'+hdr+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const d=new Date().toISOString().slice(0,10);
  a.download=`users-stats-${d}.csv`;
  a.click();URL.revokeObjectURL(a.href);
};
</script>
