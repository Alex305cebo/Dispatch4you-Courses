<!DOCTYPE html>
<html lang="ru" style="background:#070b14">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="../site-protection.js"></script>
    <meta charset="UTF-8">
    <script type="module" src="../firebase-auth-init.js?v=4.0"></script>
    <script src="../role-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Сообщения | Курсы Диспетчера</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared-nav.css?v=8.2">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{overflow-x:hidden;height:100%}
        :root{
            --primary:#06b6d4;--accent:#f97316;--success:#10b981;--danger:#ef4444;
            --bg:#050a12;--bg2:#0a0f1a;--card:rgba(15,20,35,.65);
            --border:rgba(255,255,255,.07);--t1:#ffffff;--t2:#e2e8f0;--t3:#94a3b8;--nav:64px
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);margin:0;height:100dvh;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(6,182,212,.07),transparent),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(139,92,246,.05),transparent);z-index:-1;pointer-events:none}
        #shared-nav-container{flex-shrink:0}

        .app{display:flex;flex:1;max-width:1400px;margin:0 auto;width:100%;min-height:0;overflow:hidden}

        /* ═══ THREAD LIST ═══ */
        .thread-list-container{width:360px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.6)}
        .header{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95)}
        .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .header-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px}
        .unread-badge{background:#ef4444;border-radius:12px;padding:2px 10px;font-size:13px;font-weight:700;color:#fff}
        .search-box{display:flex;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;gap:8px}
        .search-box input{flex:1;background:none;border:none;color:#fff;font-size:15px;font-family:inherit;outline:none}
        .search-box input::placeholder{color:#94a3b8}
        .thread-list{flex:1;overflow-y:auto}
        .thread-list::-webkit-scrollbar{width:4px}
        .thread-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .thread-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s;gap:12px}
        .thread-item:hover{background:rgba(255,255,255,.04)}
        .thread-item.active{background:rgba(6,182,212,.08);border-left:3px solid var(--primary)}
        .thread-item.unread{background:rgba(6,182,212,.04)}

        /* Thread avatar — маленький, для списка */
        .thread-avatar-wrap{position:relative;flex-shrink:0;width:52px;height:52px}
        .thread-avatar-svg{width:52px;height:52px;border-radius:50%;overflow:hidden;background:transparent;border:2px solid rgba(255,255,255,.08)}
        .thread-avatar-wrap.unread .thread-avatar-svg{border-color:rgba(6,182,212,.4);background:transparent}
        .thread-avatar-dot{position:absolute;top:1px;right:1px;width:13px;height:13px;border-radius:50%;background:#ef4444;border:2px solid #070b14}

        .thread-content{flex:1;min-width:0}
        .thread-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
        .thread-name{font-size:15px;font-weight:600;color:#e2e8f0}
        .thread-name.unread{font-weight:700;color:#fff}
        .thread-time{font-size:12px;color:#94a3b8}
        .thread-company{font-size:12px;color:var(--primary);margin-bottom:3px}
        .thread-preview{font-size:13px;color:#94a3b8;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .thread-preview.unread{font-weight:500;color:#cbd5e1}
        .thread-unread-count{background:var(--primary);border-radius:12px;padding:2px 8px;font-size:12px;font-weight:700;color:#fff;margin-left:4px;flex-shrink:0}

        /* ═══ CHAT ═══ */
        .chat-container{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
        .chat-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95);display:flex;align-items:center;gap:12px;flex-shrink:0}
        .chat-header-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0}
        .chat-info{flex:1}
        .chat-name{font-size:17px;font-weight:700;color:#fff}
        .chat-company{font-size:13px;color:var(--primary);margin-top:2px}

        /* ═══ MESSAGE LIST ═══ */
        .message-list{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}
        .message-list::-webkit-scrollbar{width:4px}
        .message-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

        /* Duolingo-style row */
        .msg-row{display:flex;align-items:flex-end;gap:14px}
        .msg-row.own{flex-direction:row-reverse}

        /* Big animated avatar */
        .msg-avatar{width:72px;height:72px;flex-shrink:0;position:relative}
        .msg-avatar img{width:72px;height:72px;display:block;object-fit:contain}
        /* idle bob animation */
        .msg-avatar.animate{animation:avatarBob 2.4s ease-in-out infinite}
        @keyframes avatarBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        /* talking animation — slight tilt */
        .msg-avatar.talking{animation:avatarTalk 0.35s ease-in-out infinite alternate}
        @keyframes avatarTalk{0%{transform:rotate(-2deg) translateY(0)}100%{transform:rotate(2deg) translateY(-3px)}}

        /* Bubble */
        .msg-bubble-wrap{display:flex;flex-direction:column;max-width:60%;gap:4px}
        .msg-row.own .msg-bubble-wrap{align-items:flex-end}

        .msg-bubble{
            background:#1e293b;
            border:2px solid rgba(255,255,255,.1);
            border-radius:20px;
            padding:14px 18px;
            position:relative;
            word-break:break-word;
        }
        /* tail left */
        .msg-bubble.left::after{
            content:'';position:absolute;bottom:14px;left:-10px;
            border:6px solid transparent;
            border-right-color:#1e293b;
            border-left:none;
        }
        .msg-bubble.left::before{
            content:'';position:absolute;bottom:13px;left:-13px;
            border:7px solid transparent;
            border-right-color:rgba(255,255,255,.1);
            border-left:none;
        }
        /* tail right */
        .msg-bubble.right{background:rgba(6,182,212,.18);border-color:rgba(6,182,212,.35)}
        .msg-bubble.right::after{
            content:'';position:absolute;bottom:14px;right:-10px;
            border:6px solid transparent;
            border-left-color:rgba(6,182,212,.18);
            border-right:none;
        }
        .msg-bubble.right::before{
            content:'';position:absolute;bottom:13px;right:-13px;
            border:7px solid transparent;
            border-left-color:rgba(6,182,212,.35);
            border-right:none;
        }

        .msg-subject{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px}
        .msg-text{font-size:15px;color:#e2e8f0;line-height:1.55}
        .msg-row.own .msg-text{color:#fff}
        .msg-meta{font-size:12px;color:#64748b;margin-top:4px}
        .msg-row.own .msg-meta{text-align:right;color:#94a3b8}

        /* ═══ MESSAGE DIVIDER ═══ */
        .msg-divider{
            width:100%;height:1px;flex-shrink:0;
            background:linear-gradient(90deg,transparent 0%,rgba(6,182,212,0.35) 30%,rgba(249,115,22,0.35) 70%,transparent 100%);
            margin:4px 0;
        }

        /* Spacer when no avatar (consecutive messages) */
        .msg-avatar-spacer{width:72px;flex-shrink:0}

        /* ═══ INPUT ═══ */
        .input-container{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95);display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
        .message-input{flex:1;min-height:44px;max-height:120px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:10px 16px;font-size:15px;color:#fff;font-family:inherit;resize:none;outline:none;transition:border-color .2s}
        .message-input:focus{border-color:rgba(6,182,212,.4)}
        .message-input::placeholder{color:#94a3b8}
        .send-btn{width:44px;height:44px;border-radius:22px;background:var(--primary);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(6,182,212,.4)}
        .send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

        /* ═══ EMPTY STATE ═══ */
        .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px}
        .empty-icon{font-size:64px}
        .empty-title{font-size:20px;font-weight:700;color:#e2e8f0}
        .empty-text{font-size:15px;color:#94a3b8;text-align:center;max-width:320px}

        /* ═══ MOBILE ═══ */
        @media(max-width:768px){
            .app{flex-direction:column}
            .thread-list-container{width:100%;border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
            .thread-list-container.hidden{display:none}
            .chat-container.hidden{display:none}
            .back-btn{width:36px;height:36px;border-radius:18px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--primary);cursor:pointer;margin-right:4px}
            .msg-avatar{width:56px;height:56px}
            .msg-avatar svg{width:56px;height:56px}
            .msg-avatar-spacer{width:56px}
        }
    </style>
</head>
<body>
<div id="shared-nav-container"></div>

<div class="app">
    <!-- ═══ THREAD LIST ═══ -->
    <div class="thread-list-container" id="threadListContainer">
        <div class="header">
            <div class="header-top">
                <h1 class="header-title">💬 Сообщения</h1>
                <div class="unread-badge" id="unreadBadge" style="display:none">0</div>
            </div>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" placeholder="Поиск..." id="searchInput">
            </div>
        </div>
        <div class="thread-list" id="threadList"></div>
    </div>

    <!-- ═══ CHAT ═══ -->
    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💬</div>
            <div class="empty-title">Выберите диалог</div>
            <div class="empty-text">Выберите диалог из списка слева чтобы начать общение</div>
        </div>

        <div id="chatView" style="display:none;flex:1;flex-direction:column">
            <div class="chat-header">
                <div class="back-btn" id="backBtn" style="display:none">←</div>
                <div class="chat-header-avatar" id="chatAvatar"></div>
                <div class="chat-info">
                    <div class="chat-name" id="chatName"></div>
                    <div class="chat-company" id="chatCompany"></div>
                </div>
            </div>
            <div class="message-list" id="messageList"></div>
            <div class="input-container">
                <textarea class="message-input" id="messageInput" placeholder="Написать сообщение..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import('../shared-nav.js').then(m => m.initSharedNav && m.initSharedNav());

// ═══ AVATARS — local APNG files ═══
const AVATAR_URLS = {
    dispatcher: '../audio/avatars/dispatcher.png',
    driver:     '../audio/avatars/driver.png',
    broker:     '../audio/avatars/broker.png',
    system:     '../audio/avatars/system.png',
};

function getAvatarImg(role, size=72) {
    const url = AVATAR_URLS[role] || AVATAR_URLS.system;
    return `<img src="${url}" width="${size}" height="${size}" style="object-fit:contain;display:block;" alt="${role}" loading="lazy">`;
}

// ═══ STATE ═══
let threads = {};
let selectedThreadId = null;

init();

function init() {
    loadThreads();
    renderThreadList();
    document.getElementById('searchInput').addEventListener('input', handleSearch);
    document.getElementById('sendBtn').addEventListener('click', handleSendMessage);
    document.getElementById('messageInput').addEventListener('input', handleInputChange);
    document.getElementById('messageInput').addEventListener('keydown', handleInputKeydown);
    document.getElementById('backBtn').addEventListener('click', handleBack);
    setInterval(saveThreads, 5000);
}

function loadThreads() {
    try {
        const saved = localStorage.getItem('unified-chat-threads');
        threads = saved ? JSON.parse(saved) : createDemoThreads();
    } catch(e) {
        threads = createDemoThreads();
    }
}

function saveThreads() {
    try { localStorage.setItem('unified-chat-threads', JSON.stringify(threads)); } catch(e) {}
}

function createDemoThreads() {
    const now = Date.now();
    return {
        'thread-driver-mike': {
            id: 'thread-driver-mike',
            participantName: 'Mike Johnson',
            participantRole: 'driver',
            participantCompany: 'Водитель · TRK-001',
            messages: [
                { id:'m1', from:'driver', fromName:'Mike', type:'sms', text:'Привет! Я на месте погрузки. Жду очереди.', timestamp: now-3600000, read:true },
                { id:'m2', from:'dispatcher', fromName:'Вы', type:'sms', text:'Отлично! Держи меня в курсе.', timestamp: now-3500000, read:true },
                { id:'m3', from:'driver', fromName:'Mike', type:'sms', text:'Загрузился! Еду на delivery. ETA 4 часа.', timestamp: now-1800000, read:false },
            ],
            lastMessageTime: now-1800000, unreadCount:1, isActive:true, isPinned:false,
        },
        'thread-broker-sarah': {
            id: 'thread-broker-sarah',
            participantName: 'Sarah Williams',
            participantRole: 'broker',
            participantCompany: 'QuickLoad Inc',
            messages: [
                { id:'m4', from:'broker', fromName:'Sarah', type:'email', subject:'Новый груз — Dallas → Chicago', text:'Привет! У меня есть груз из Dallas в Chicago. $2800. Интересно?', timestamp: now-7200000, read:false, priority:'high' },
            ],
            lastMessageTime: now-7200000, unreadCount:1, isActive:true, isPinned:true,
        },
        'thread-broker-tom': {
            id: 'thread-broker-tom',
            participantName: 'Tom Reed',
            participantRole: 'broker',
            participantCompany: 'FastFreight LLC',
            messages: [
                { id:'m5', from:'broker', fromName:'Tom', type:'email', subject:'Rate Con #4421', text:'Высылаю Rate Con на груз Houston → Atlanta. Пожалуйста подпиши и верни.', timestamp: now-86400000, read:true },
                { id:'m6', from:'dispatcher', fromName:'Вы', type:'email', text:'Получил, подписываю.', timestamp: now-82800000, read:true },
            ],
            lastMessageTime: now-82800000, unreadCount:0, isActive:true, isPinned:false,
        },
    };
}

// ═══ RENDER THREAD LIST ═══
function renderThreadList() {
    const container = document.getElementById('threadList');
    const list = Object.values(threads)
        .filter(t => t.isActive)
        .sort((a,b) => {
            if (a.isPinned && !b.isPinned) return -1;
            if (!a.isPinned && b.isPinned) return 1;
            return b.lastMessageTime - a.lastMessageTime;
        });

    if (!list.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Нет сообщений</div></div>';
        return;
    }

    container.innerHTML = list.map(t => {
        const last = t.messages[t.messages.length-1];
        const unread = t.unreadCount > 0;
        const active = t.id === selectedThreadId;
        return `
        <div class="thread-item ${unread?'unread':''} ${active?'active':''}" onclick="openThread('${t.id}')">
            <div class="thread-avatar-wrap ${unread?'unread':''}">
                <div class="thread-avatar-svg">${getAvatarImg(t.participantRole, 48)}</div>
                ${unread ? '<div class="thread-avatar-dot"></div>' : ''}
            </div>
            <div class="thread-content">
                <div class="thread-header">
                    <div class="thread-name ${unread?'unread':''}">${t.participantName}</div>
                    <div class="thread-time">${formatTime(t.lastMessageTime)}</div>
                </div>
                ${t.participantCompany ? `<div class="thread-company">${t.participantCompany}</div>` : ''}
                <div class="thread-preview ${unread?'unread':''}">${last?.subject ? last.subject+': ' : ''}${last?.text||''}</div>
            </div>
            ${unread ? `<div class="thread-unread-count">${t.unreadCount}</div>` : ''}
        </div>`;
    }).join('');

    const total = list.reduce((s,t) => s+t.unreadCount, 0);
    const badge = document.getElementById('unreadBadge');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'block' : 'none';
}

// ═══ OPEN THREAD ═══
function openThread(threadId) {
    selectedThreadId = threadId;
    const t = threads[threadId];
    if (!t) return;

    t.unreadCount = 0;
    t.messages.forEach(m => m.read = true);

    document.getElementById('emptyState').style.display = 'none';
    const cv = document.getElementById('chatView');
    cv.style.display = 'flex';
    cv.style.flex = '1';
    cv.style.flexDirection = 'column';

    // Header avatar
    document.getElementById('chatAvatar').innerHTML = getAvatarImg(t.participantRole, 44);
    document.getElementById('chatName').textContent = t.participantName;
    const comp = document.getElementById('chatCompany');
    comp.textContent = t.participantCompany || '';
    comp.style.display = t.participantCompany ? 'block' : 'none';

    renderMessages(t);

    if (window.innerWidth <= 768) {
        document.getElementById('threadListContainer').classList.add('hidden');
        document.getElementById('backBtn').style.display = 'flex';
    }

    renderThreadList();
    document.getElementById('messageInput').focus();
}

// ═══ RENDER MESSAGES ═══
function renderMessages(thread) {
    const container = document.getElementById('messageList');

    container.innerHTML = thread.messages.map((msg, i) => {
        const isOwn = msg.from === 'dispatcher';
        const prevFrom = i > 0 ? thread.messages[i-1].from : null;
        const showAvatar = prevFrom !== msg.from;
        const role = isOwn ? 'dispatcher' : thread.participantRole;

        const avatarHtml = showAvatar
            ? `<div class="msg-avatar animate" data-role="${role}">${getAvatarImg(role, 72)}</div>`
            : `<div class="msg-avatar-spacer"></div>`;

        const bubbleSide = isOwn ? 'right' : 'left';

        const divider = i < thread.messages.length - 1 ? '<div class="msg-divider"></div>' : '';
        return `
        <div class="msg-row ${isOwn?'own':''}">
            ${avatarHtml}
            <div class="msg-bubble-wrap">
                ${msg.subject ? `<div class="msg-subject">${msg.subject}</div>` : ''}
                <div class="msg-bubble ${bubbleSide}">
                    <div class="msg-text">${msg.text}</div>
                </div>
                <div class="msg-meta">${formatTime(msg.timestamp)}</div>
            </div>
        </div>${divider}`;
    }).join('');

    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 80);
}

// ═══ SEND ═══
function handleSendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !selectedThreadId) return;

    const t = threads[selectedThreadId];
    if (!t) return;

    const msg = {
        id: `msg-${Date.now()}`,
        from: 'dispatcher', fromName: 'Вы', type: 'sms',
        text, timestamp: Date.now(), read: true,
    };
    t.messages.push(msg);
    t.lastMessageTime = msg.timestamp;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    renderMessages(t);
    renderThreadList();
    saveThreads();
}

function handleInputChange(e) {
    document.getElementById('sendBtn').disabled = !e.target.value.trim();
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
}

function handleInputKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
}

function handleSearch(e) {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.thread-item').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
    });
}

function handleBack() {
    selectedThreadId = null;
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('threadListContainer').classList.remove('hidden');
    document.getElementById('backBtn').style.display = 'none';
}

function formatTime(ts) {
    const d = new Date(ts), now = new Date();
    const mins = Math.floor((now-d)/60000);
    const hrs = Math.floor(mins/60);
    const days = Math.floor(hrs/24);
    if (mins < 1) return 'только что';
    if (mins < 60) return `${mins} мин назад`;
    if (hrs < 24) return `${hrs} ч назад`;
    if (days < 7) return `${days} д назад`;
    return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
}

window.openThread = openThread;
</script>

<script src="../shared-nav.js"></script>
</body>
</html>
