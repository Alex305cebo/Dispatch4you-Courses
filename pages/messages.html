<!DOCTYPE html>
<html lang="ru" style="background:#070b14">
<head>
    <script src="../site-protection.js"></script>
    <meta charset="UTF-8">
    <script type="module" src="../firebase-auth-init.js?v=4.0"></script>
    <script src="../role-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Сообщения | Курсы Диспетчера</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared-nav.css?v=8.2">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{overflow-x:hidden;height:100%}
        :root{--primary:#06b6d4;--accent:#f97316;--success:#10b981;--danger:#ef4444;--bg:#050a12;--bg2:#0a0f1a;--card:rgba(15,20,35,.65);--border:rgba(255,255,255,.07);--t1:#ffffff;--t2:#e2e8f0;--t3:#94a3b8;--nav:64px}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);margin:0;height:100dvh;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(6,182,212,.07),transparent),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(139,92,246,.05),transparent);z-index:-1;pointer-events:none}

        #shared-nav-container{flex-shrink:0}
        
        .app{display:flex;flex:1;max-width:1400px;margin:0 auto;width:100%;min-height:0;overflow:hidden}
        
        /* ═══ THREAD LIST ═══ */
        .thread-list-container{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.6)}
        
        .header{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95)}
        .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .header-title{font-size:24px;font-weight:800;color:#ffffff;letter-spacing:-0.5px}
        .unread-badge{background:#ef4444;border-radius:12px;padding:2px 10px;font-size:13px;font-weight:700;color:#fff}
        
        .search-box{display:flex;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;gap:8px}
        .search-box input{flex:1;background:none;border:none;color:#fff;font-size:15px;font-family:inherit;outline:none}
        .search-box input::placeholder{color:#94a3b8}
        
        .thread-list{flex:1;overflow-y:auto}
        .thread-list::-webkit-scrollbar{width:4px}
        .thread-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        
        .thread-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s}
        .thread-item:hover{background:rgba(255,255,255,.04)}
        .thread-item.active{background:rgba(6,182,212,.08);border-left:3px solid var(--primary)}
        .thread-item.unread{background:rgba(6,182,212,.04)}
        
        .thread-avatar{width:52px;height:52px;border-radius:26px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:12px;position:relative;flex-shrink:0}
        .thread-avatar.unread{background:rgba(6,182,212,.15);border:2px solid rgba(6,182,212,.3)}
        .thread-avatar-dot{position:absolute;top:2px;right:2px;width:12px;height:12px;border-radius:6px;background:#ef4444;border:2px solid var(--bg)}
        
        .thread-content{flex:1;min-width:0}
        .thread-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
        .thread-name{font-size:15px;font-weight:600;color:#e2e8f0}
        .thread-name.unread{font-weight:700;color:#fff}
        .thread-time{font-size:13px;color:#94a3b8}
        .thread-company{font-size:13px;color:var(--primary);margin-bottom:4px}
        .thread-preview{font-size:14px;color:#94a3b8;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .thread-preview.unread{font-weight:500;color:#cbd5e1}
        
        .thread-unread-count{background:var(--primary);border-radius:12px;padding:2px 8px;font-size:13px;font-weight:700;color:#fff;margin-left:8px}
        
        /* ═══ CHAT ═══ */
        .chat-container{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        
        .chat-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95);display:flex;align-items:center;gap:12px}
        .chat-avatar{width:44px;height:44px;border-radius:22px;background:rgba(6,182,212,.15);display:flex;align-items:center;justify-content:center;font-size:22px}
        .chat-info{flex:1}
        .chat-name{font-size:18px;font-weight:700;color:#fff}
        .chat-company{font-size:14px;color:var(--primary);margin-top:2px}
        
        .message-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
        .message-list::-webkit-scrollbar{width:4px}
        .message-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
        
        .message-bubble-container{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
        .message-bubble-container.own{justify-content:flex-end}
        
        .message-avatar{width:32px;height:32px;border-radius:16px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .message-avatar-spacer{width:40px}
        
        .message-bubble{max-width:70%;background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.08);border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px}
        .message-bubble.own{background:rgba(6,182,212,.15);border-color:rgba(6,182,212,.2);border-bottom-left-radius:16px;border-bottom-right-radius:4px}
        
        .message-subject{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px}
        .message-text{font-size:15px;color:#e2e8f0;line-height:1.5}
        .message-text.own{color:#fff}
        
        .message-footer{display:flex;align-items:center;gap:6px;margin-top:6px}
        .message-type-icon{font-size:13px}
        .message-time{font-size:13px;color:#94a3b8}
        .message-time.own{color:#cbd5e1}
        .priority-dot{width:6px;height:6px;border-radius:3px}
        
        /* ═══ INPUT ═══ */
        .input-container{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.95);display:flex;align-items:flex-end;gap:12px}
        .message-input{flex:1;min-height:44px;max-height:120px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:10px 16px;font-size:15px;color:#fff;font-family:inherit;resize:none;outline:none}
        .message-input::placeholder{color:#94a3b8}
        .send-btn{width:44px;height:44px;border-radius:22px;background:var(--primary);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(6,182,212,.4)}
        .send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
        
        /* ═══ EMPTY STATE ═══ */
        .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
        .empty-icon{font-size:64px;margin-bottom:16px}
        .empty-title{font-size:20px;font-weight:700;color:#e2e8f0;margin-bottom:8px}
        .empty-text{font-size:15px;color:#94a3b8;text-align:center;max-width:320px}
        
        /* ═══ MOBILE ═══ */
        @media(max-width:768px){
          .app{flex-direction:column}
          .thread-list-container{width:100%;border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
          .thread-list-container.hidden{display:none}
          .chat-container.hidden{display:none}
          .chat-header{padding:12px 16px}
          .back-btn{width:36px;height:36px;border-radius:18px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--primary);cursor:pointer;margin-right:8px}
        }
    </style>
</head>
<body>
    <div id="shared-nav-container"></div>
    
    <div class="app">
        <!-- ═══ THREAD LIST ═══ -->
        <div class="thread-list-container" id="threadListContainer">
            <div class="header">
                <div class="header-top">
                    <h1 class="header-title">💬 Сообщения</h1>
                    <div class="unread-badge" id="unreadBadge" style="display:none">0</div>
                </div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Поиск..." id="searchInput">
                </div>
            </div>
            
            <div class="thread-list" id="threadList">
                <!-- Threads will be rendered here -->
            </div>
        </div>
        
        <!-- ═══ CHAT ═══ -->
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">💬</div>
                <div class="empty-title">Выберите диалог</div>
                <div class="empty-text">Выберите диалог из списка слева чтобы начать общение</div>
            </div>
            
            <div id="chatView" style="display:none;flex:1;display:flex;flex-direction:column">
                <div class="chat-header">
                    <div class="back-btn" id="backBtn" style="display:none">←</div>
                    <div class="chat-avatar" id="chatAvatar"></div>
                    <div class="chat-info">
                        <div class="chat-name" id="chatName"></div>
                        <div class="chat-company" id="chatCompany"></div>
                    </div>
                </div>
                
                <div class="message-list" id="messageList"></div>
                
                <div class="input-container">
                    <textarea class="message-input" id="messageInput" placeholder="Написать сообщение..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        // ═══════════════════════════════════════════════════════════════════
        // UNIFIED CHAT — Web Implementation
        // ═══════════════════════════════════════════════════════════════════
        
        // Простое хранилище (позже подключим к Firebase)
        let threads = {};
        let selectedThreadId = null;
        
        // Загрузка навигации
        import('../shared-nav.js').then(module => {
            module.initSharedNav();
        });
        
        // Инициализация
        init();
        
        function init() {
            // Загружаем данные
            loadThreads();
            
            // Рендерим список
            renderThreadList();
            
            // События
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('sendBtn').addEventListener('click', handleSendMessage);
            document.getElementById('messageInput').addEventListener('input', handleInputChange);
            document.getElementById('messageInput').addEventListener('keydown', handleInputKeydown);
            document.getElementById('backBtn').addEventListener('click', handleBack);
            
            // Автосохранение
            setInterval(saveThreads, 5000);
        }
        
        function loadThreads() {
            try {
                const saved = localStorage.getItem('unified-chat-threads');
                if (saved) {
                    threads = JSON.parse(saved);
                } else {
                    // Демо данные
                    threads = createDemoThreads();
                }
            } catch (e) {
                threads = createDemoThreads();
            }
        }
        
        function saveThreads() {
            try {
                localStorage.setItem('unified-chat-threads', JSON.stringify(threads));
            } catch (e) {
                console.error('Failed to save threads:', e);
            }
        }
        
        function createDemoThreads() {
            const now = Date.now();
            return {
                'thread-driver-mike': {
                    id: 'thread-driver-mike',
                    participantName: 'Mike',
                    participantRole: 'driver',
                    participantAvatar: '👨‍✈️',
                    participantCompany: 'Водитель T-001',
                    messages: [
                        {
                            id: 'msg-1',
                            threadId: 'thread-driver-mike',
                            type: 'sms',
                            from: 'driver',
                            fromName: 'Mike',
                            text: 'Привет! Я на месте погрузки. Жду очереди.',
                            timestamp: now - 3600000,
                            read: true,
                        },
                        {
                            id: 'msg-2',
                            threadId: 'thread-driver-mike',
                            type: 'sms',
                            from: 'dispatcher',
                            fromName: 'Вы',
                            text: 'Отлично! Держи меня в курсе.',
                            timestamp: now - 3500000,
                            read: true,
                        },
                        {
                            id: 'msg-3',
                            threadId: 'thread-driver-mike',
                            type: 'sms',
                            from: 'driver',
                            fromName: 'Mike',
                            text: 'Загрузился! Еду на delivery.',
                            timestamp: now - 1800000,
                            read: false,
                        },
                    ],
                    lastMessageTime: now - 1800000,
                    unreadCount: 1,
                    isActive: true,
                    isPinned: false,
                    isMuted: false,
                },
                'thread-broker-sarah': {
                    id: 'thread-broker-sarah',
                    participantName: 'Sarah',
                    participantRole: 'broker',
                    participantAvatar: '👩‍💼',
                    participantCompany: 'QuickLoad Inc',
                    messages: [
                        {
                            id: 'msg-4',
                            threadId: 'thread-broker-sarah',
                            type: 'email',
                            from: 'broker',
                            fromName: 'Sarah',
                            text: 'Привет! У меня есть груз из Dallas в Chicago. $2800. Интересно?',
                            subject: 'Новый груз — Dallas → Chicago',
                            timestamp: now - 7200000,
                            read: false,
                            priority: 'high',
                        },
                    ],
                    lastMessageTime: now - 7200000,
                    unreadCount: 1,
                    isActive: true,
                    isPinned: true,
                    isMuted: false,
                },
            };
        }
        
        function renderThreadList() {
            const container = document.getElementById('threadList');
            const allThreads = Object.values(threads)
                .filter(t => t.isActive)
                .sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                    return b.lastMessageTime - a.lastMessageTime;
                });
            
            if (allThreads.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Нет сообщений</div></div>';
                return;
            }
            
            container.innerHTML = allThreads.map(thread => {
                const lastMsg = thread.messages[thread.messages.length - 1];
                const isUnread = thread.unreadCount > 0;
                const isActive = thread.id === selectedThreadId;
                
                return `
                    <div class="thread-item ${isUnread ? 'unread' : ''} ${isActive ? 'active' : ''}" 
                         onclick="openThread('${thread.id}')">
                        <div class="thread-avatar ${isUnread ? 'unread' : ''}">
                            ${thread.participantAvatar}
                            ${isUnread ? '<div class="thread-avatar-dot"></div>' : ''}
                        </div>
                        <div class="thread-content">
                            <div class="thread-header">
                                <div class="thread-name ${isUnread ? 'unread' : ''}">${thread.participantName}</div>
                                <div class="thread-time">${formatTime(thread.lastMessageTime)}</div>
                            </div>
                            ${thread.participantCompany ? `<div class="thread-company">${thread.participantCompany}</div>` : ''}
                            <div class="thread-preview ${isUnread ? 'unread' : ''}">
                                ${lastMsg?.subject ? lastMsg.subject + ': ' : ''}${lastMsg?.text || 'Нет сообщений'}
                            </div>
                        </div>
                        ${isUnread ? `<div class="thread-unread-count">${thread.unreadCount}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            // Update unread badge
            const totalUnread = allThreads.reduce((sum, t) => sum + t.unreadCount, 0);
            const badge = document.getElementById('unreadBadge');
            if (totalUnread > 0) {
                badge.textContent = totalUnread;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }
        
        function openThread(threadId) {
            selectedThreadId = threadId;
            const thread = threads[threadId];
            
            if (!thread) return;
            
            // Mark as read
            thread.unreadCount = 0;
            thread.messages.forEach(msg => msg.read = true);
            
            // Update UI
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = thread.participantAvatar;
            document.getElementById('chatName').textContent = thread.participantName;
            document.getElementById('chatCompany').textContent = thread.participantCompany || '';
            document.getElementById('chatCompany').style.display = thread.participantCompany ? 'block' : 'none';
            
            // Render messages
            renderMessages(thread);
            
            // Mobile: hide thread list
            if (window.innerWidth <= 768) {
                document.getElementById('threadListContainer').classList.add('hidden');
                document.getElementById('backBtn').style.display = 'flex';
            }
            
            // Re-render thread list to update unread counts
            renderThreadList();
            
            // Focus input
            document.getElementById('messageInput').focus();
        }
        
        function renderMessages(thread) {
            const container = document.getElementById('messageList');
            
            container.innerHTML = thread.messages.map((msg, index) => {
                const isOwn = msg.from === 'dispatcher';
                const showAvatar = index === 0 || thread.messages[index - 1].from !== msg.from;
                
                return `
                    <div class="message-bubble-container ${isOwn ? 'own' : ''}">
                        ${!isOwn && showAvatar ? `<div class="message-avatar">${thread.participantAvatar}</div>` : ''}
                        ${!isOwn && !showAvatar ? '<div class="message-avatar-spacer"></div>' : ''}
                        
                        <div class="message-bubble ${isOwn ? 'own' : ''}">
                            ${msg.subject ? `<div class="message-subject">${msg.subject}</div>` : ''}
                            <div class="message-text ${isOwn ? 'own' : ''}">${msg.text}</div>
                            <div class="message-footer">
                                <span class="message-type-icon">${getMessageTypeIcon(msg.type)}</span>
                                <span class="message-time ${isOwn ? 'own' : ''}">${formatTime(msg.timestamp)}</span>
                                ${msg.priority && msg.priority !== 'low' ? `<div class="priority-dot" style="background:${getPriorityColor(msg.priority)}"></div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }
        
        function handleSendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !selectedThreadId) return;
            
            const thread = threads[selectedThreadId];
            if (!thread) return;
            
            // Add message
            const newMessage = {
                id: `msg-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                threadId: selectedThreadId,
                type: 'sms',
                from: 'dispatcher',
                fromName: 'Вы',
                text: text,
                timestamp: Date.now(),
                read: true,
            };
            
            thread.messages.push(newMessage);
            thread.lastMessageTime = newMessage.timestamp;
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;
            
            // Re-render
            renderMessages(thread);
            renderThreadList();
            
            // Save
            saveThreads();
        }
        
        function handleInputChange(e) {
            const btn = document.getElementById('sendBtn');
            btn.disabled = !e.target.value.trim();
            
            // Auto-resize
            e.target.style.height = 'auto';
            e.target.style.height = e.target.scrollHeight + 'px';
        }
        
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        }
        
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.thread-item');
            
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }
        
        function handleBack() {
            selectedThreadId = null;
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('chatView').style.display = 'none';
            document.getElementById('threadListContainer').classList.remove('hidden');
            document.getElementById('backBtn').style.display = 'none';
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'только что';
            if (diffMins < 60) return `${diffMins} мин назад`;
            if (diffHours < 24) return `${diffHours} ч назад`;
            if (diffDays < 7) return `${diffDays} д назад`;
            
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        
        function getMessageTypeIcon(type) {
            const icons = {
                sms: '💬',
                email: '📧',
                voicemail: '🎤',
                voice_call: '📞',
                system: '🔔',
            };
            return icons[type] || '💬';
        }
        
        function getPriorityColor(priority) {
            const colors = {
                urgent: '#ef4444',
                high: '#f97316',
                medium: '#f59e0b',
                low: '#94a3b8',
            };
            return colors[priority] || '#94a3b8';
        }
        
        // Make functions global for onclick
        window.openThread = openThread;
    </script>
    
    <script src="../shared-nav.js"></script>
</body>
</html>
