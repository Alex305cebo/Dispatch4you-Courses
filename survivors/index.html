<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Выжившие</title>
<style>
  :root{--bg1:#0b0e17;--bg2:#05060a;--panel:#121724;--panel2:#1a2130;--border:#293042;--text:#e8ebf2;--muted:#8891a3;--danger:#ef4444;--xp:#4D96FF;--hp:#ef4444;}
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100vh;background:var(--bg2);}
  canvas#bgfx{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
  body{color:var(--text);font-family:system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .wrap{position:relative;z-index:1;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
  .arena{position:relative;}
  canvas#sboard{background:#0c0f18;border:1px solid var(--border);border-radius:12px;display:block;max-width:88vw;height:auto;touch-action:none;}
  .side{min-width:190px;}
  .box{background:var(--panel);border-radius:8px;padding:12px 16px;margin-bottom:12px;}
  .label{font-size:13px;color:var(--muted);margin-bottom:4px;}
  #stime{font-size:26px;font-weight:500;}
  .small{font-size:16px;font-weight:500;}
  .row{display:flex;gap:12px;}
  .row>div{flex:1;}
  .bar{height:10px;border-radius:5px;background:var(--panel2);overflow:hidden;margin-top:4px;}
  .bar>div{height:100%;width:0%;transition:width .15s;}
  #hpbar>div{background:linear-gradient(90deg,#ef4444,#f97316);}
  #xpbar>div{background:linear-gradient(90deg,#4D96FF,#B388FF);}
  button{width:100%;padding:10px;font-size:15px;background:var(--panel2);color:var(--text);
    border:1px solid var(--border);border-radius:8px;cursor:pointer;}
  button:hover{background:#242c3a;}
  .hint{font-size:13px;color:var(--muted);line-height:1.6;margin-top:12px;}
  .overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(5,6,10,0.82);border-radius:12px;text-align:center;padding:20px;}
  .overlay.show{display:flex;}
  .overlay h2{margin:0;font-weight:600;font-size:22px;}
  .overlay p{margin:0;color:var(--muted);font-size:14px;max-width:340px;line-height:1.5;}
  .cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .card{width:150px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:left;}
  .card:hover{background:var(--panel2);border-color:#4D96FF;}
  .card b{display:block;font-size:14px;margin-bottom:6px;color:#4D96FF;}
  .card span{font-size:12px;color:var(--muted);line-height:1.4;}
  .ostart{padding:10px 22px;font-size:15px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;}
  .ostart:hover{background:#242c3a;}
</style>
</head>
<body>
<canvas id="bgfx"></canvas>
<div class="wrap">
  <div class="arena">
    <canvas id="sboard" width="640" height="480"></canvas>
    <div id="ostart" class="overlay show">
      <h2>Выжившие</h2>
      <p>WASD / стрелки — движение. Оружие стреляет само. Собирай синие кристаллы опыта, выбирай улучшения, продержись как можно дольше.</p>
      <button class="ostart" id="btnStart">Начать</button>
    </div>
    <div id="olevel" class="overlay">
      <h2>Новый уровень!</h2>
      <div class="cards" id="cards"></div>
    </div>
    <div id="oover" class="overlay">
      <h2>Ты погиб</h2>
      <p id="overStats"></p>
      <button class="ostart" id="btnRetry">Заново</button>
    </div>
  </div>
  <div class="side">
    <div class="box"><div class="label">Время</div><div id="stime">00:00</div></div>
    <div class="box row"><div><div class="label">Уровень</div><div id="slevel" class="small">1</div></div><div><div class="label">Убийств</div><div id="skills" class="small">0</div></div></div>
    <div class="box"><div class="label">HP</div><div class="bar" id="hpbar"><div></div></div></div>
    <div class="box"><div class="label">Опыт</div><div class="bar" id="xpbar"><div></div></div></div>
    <div class="box"><div class="label">Рекорд времени</div><div id="sbest" class="small">00:00</div></div>
    <p class="hint">WASD / стрелки — движение<br>на телефоне — тяни пальцем по полю</p>
  </div>
</div>
<script>
(function(){
  const W=640,H=480;
  const cv=document.getElementById('sboard'),x=cv.getContext('2d');
  const timeEl=document.getElementById('stime'),levelEl=document.getElementById('slevel'),killsEl=document.getElementById('skills'),bestEl=document.getElementById('sbest');
  const hpFill=document.querySelector('#hpbar>div'),xpFill=document.querySelector('#xpbar>div');
  const ostart=document.getElementById('ostart'),olevel=document.getElementById('olevel'),oover=document.getElementById('oover');
  const cardsEl=document.getElementById('cards'),overStats=document.getElementById('overStats');

  let best=parseFloat(localStorage.getItem('survivors-best')||'0');
  bestEl.textContent=fmtTime(best);

  let actx=null;
  function ensureAudio(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}else if(actx.state==='suspended')actx.resume();}
  function beep(freq,dur,type,gain){if(!actx)return;const t0=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type=type||'square';o.frequency.value=freq;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(gain||0.1,t0+0.01);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);o.start(t0);o.stop(t0+dur);}

  function fmtTime(s){s=Math.floor(s);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function rand(a,b){return a+Math.random()*(b-a);}
  function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

  const ENEMY_TYPES={
    chaser:{hp:18,speed:70,dmg:8,r:12,color:'#ef4444',xp:1},
    fast:{hp:10,speed:130,dmg:6,r:9,color:'#facc15',xp:1},
    tank:{hp:70,speed:45,dmg:14,r:18,color:'#a855f7',xp:3},
  };

  const UPGRADES=[
    {id:'dmg',name:'Урон +35%',desc:'Больше урона за выстрел',apply:p=>p.dmg=Math.round(p.dmg*1.35)},
    {id:'rate',name:'Скорострельность +18%',desc:'Оружие стреляет чаще',apply:p=>p.fireRate=Math.max(120,Math.round(p.fireRate*0.82))},
    {id:'speed',name:'Скорость +12%',desc:'Быстрее передвижение',apply:p=>p.speed=Math.round(p.speed*1.12)},
    {id:'hp',name:'Макс. HP +20',desc:'Больше живучести, лечит 30',apply:p=>{p.maxHp+=20;p.hp=Math.min(p.maxHp,p.hp+30);}},
    {id:'multi',name:'+1 снаряд',desc:'Ещё один снаряд веером',cond:p=>p.projCount<6,apply:p=>p.projCount++},
    {id:'pierce',name:'Пробитие +1',desc:'Снаряд пробивает больше врагов',cond:p=>p.pierce<6,apply:p=>p.pierce++},
    {id:'pickup',name:'Радиус подбора +30%',desc:'Собирает опыт издалека',apply:p=>p.pickupRadius=Math.round(p.pickupRadius*1.3)},
    {id:'regen',name:'Регенерация +1/с',desc:'Восстанавливает HP со временем',apply:p=>p.regen+=1},
    {id:'aura',name:'Аура урона',desc:'Дамажит врагов рядом каждую секунду',apply:p=>{p.auraLevel=(p.auraLevel||0)+1;p.auraDmg=p.auraLevel*8;p.auraRadius=60+p.auraLevel*10;}},
    {id:'projspeed',name:'Скорость снарядов +20%',desc:'Снаряды летят быстрее',apply:p=>p.projSpeed=Math.round(p.projSpeed*1.2)},
  ];

  let player,enemies,projectiles,gems,particles,rings;
  let t,spawnAcc,nextBossAt,camShake,kills,pendingLevelUps,state,raf,last,keys,moveVec,joy;

  function newPlayer(){
    return {x:0,y:0,r:14,hp:100,maxHp:100,speed:180,dmg:18,fireRate:550,fireAcc:0,
      projSpeed:420,projCount:1,pierce:1,pickupRadius:40,regen:0,
      auraLevel:0,auraDmg:0,auraRadius:0,auraAcc:0,
      level:1,xp:0,xpNeed:8,invuln:0,facing:{x:1,y:0}};
  }

  function reset(){
    player=newPlayer();enemies=[];projectiles=[];gems=[];particles=[];rings=[];
    t=0;spawnAcc=0;nextBossAt=45;camShake=0;kills=0;pendingLevelUps=0;
    keys={};moveVec={x:0,y:0};joy={active:false,bx:0,by:0,cx:0,cy:0};
    updateHud();
  }

  function difficulty(){
    return {
      interval:Math.max(220,1000-t*6),
      count:1+Math.floor(t/40),
      hpMul:1+t/45,
      spdMul:Math.min(2.2,1+t/150),
    };
  }

  function pickType(){
    const r=Math.random();
    if(t>60&&r<0.28)return 'tank';
    if(t>20&&r<0.55)return 'fast';
    return 'chaser';
  }

  function spawnEnemy(elite){
    const ang=rand(0,Math.PI*2),rad=Math.max(W,H)/2+80;
    const d=difficulty();
    const type=elite?'tank':pickType();
    const base=ENEMY_TYPES[type];
    const m=elite?4:1;
    enemies.push({x:player.x+Math.cos(ang)*rad,y:player.y+Math.sin(ang)*rad,
      hp:base.hp*d.hpMul*m,maxHp:base.hp*d.hpMul*m,speed:base.speed*d.spdMul*(elite?0.7:1),
      dmg:base.dmg*(elite?1.6:1),r:base.r*(elite?1.8:1),color:elite?'#22d3ee':base.color,
      xp:base.xp*(elite?12:1),elite:!!elite});
  }

  function burst(px,py,color,n){for(let i=0;i<n;i++)particles.push({x:px,y:py,vx:rand(-3,3),vy:rand(-3,3),life:1,color,sz:2+Math.random()*3});}

  function killEnemy(e){
    kills++;burst(e.x,e.y,e.color,8);
    gems.push({x:e.x,y:e.y,value:e.xp,r:e.elite?9:5});
    beep(e.elite?160:300,0.12,'triangle',0.08);
  }

  function nearestEnemy(range){
    let best=null,bd=range;
    for(const e of enemies){const d=dist(player,e);if(d<bd){bd=d;best=e;}}
    return best;
  }

  function fire(dt){
    player.fireAcc+=dt*1000;
    if(player.fireAcc<player.fireRate)return;
    const target=nearestEnemy(500);
    if(!target)return;
    player.fireAcc=0;
    const ang=Math.atan2(target.y-player.y,target.x-player.x);
    const n=player.projCount,spread=0.16;
    for(let i=0;i<n;i++){
      const a=ang+spread*(i-(n-1)/2);
      projectiles.push({x:player.x,y:player.y,vx:Math.cos(a)*player.projSpeed,vy:Math.sin(a)*player.projSpeed,
        dmg:player.dmg,pierceLeft:player.pierce,r:5,life:1.2,hitSet:new Set()});
    }
    beep(660,0.03,'square',0.03);
  }

  function applyAura(dt){
    if(!player.auraLevel)return;
    player.auraAcc+=dt;
    if(player.auraAcc<1)return;
    player.auraAcc=0;
    rings.push({x:player.x,y:player.y,r:0,maxR:player.auraRadius,life:1});
    for(const e of enemies){if(dist(player,e)<player.auraRadius){e.hp-=player.auraDmg;}}
  }

  function grantXp(v){
    player.xp+=v;
    while(player.xp>=player.xpNeed){
      player.xp-=player.xpNeed;player.level++;
      player.xpNeed=Math.round(player.xpNeed*1.22)+5;
      pendingLevelUps++;
    }
    if(pendingLevelUps>0&&state==='running'){showLevelUp();}
  }

  function showLevelUp(){
    state='levelup';
    const pool=UPGRADES.filter(u=>!u.cond||u.cond(player));
    const picks=[];
    const copy=pool.slice();
    for(let i=0;i<3&&copy.length;i++){picks.push(copy.splice(Math.floor(Math.random()*copy.length),1)[0]);}
    cardsEl.innerHTML='';
    picks.forEach(u=>{
      const el=document.createElement('div');el.className='card';
      el.innerHTML='<b>'+u.name+'</b><span>'+u.desc+'</span>';
      el.onclick=()=>{u.apply(player);pendingLevelUps--;beep(523,0.08,'sine',0.1);setTimeout(()=>beep(659,0.1,'sine',0.1),80);
        olevel.classList.remove('show');
        if(pendingLevelUps>0)showLevelUp();else{state='running';last=performance.now();raf=requestAnimationFrame(loop);}
      };
      cardsEl.appendChild(el);
    });
    olevel.classList.add('show');
    updateHud();
  }

  function updateHud(){
    timeEl.textContent=fmtTime(t);
    levelEl.textContent=player.level;
    killsEl.textContent=kills;
    hpFill.style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
    xpFill.style.width=Math.min(100,player.xp/player.xpNeed*100)+'%';
  }

  function hurtPlayer(dmg){
    if(player.invuln>0)return;
    player.hp-=dmg;player.invuln=0.5;camShake=8;
    beep(120,0.15,'sawtooth',0.12);
    if(player.hp<=0)gameOver();
  }

  function gameOver(){
    state='over';
    if(t>best){best=t;localStorage.setItem('survivors-best',String(best));bestEl.textContent=fmtTime(best);}
    overStats.textContent='Продержался '+fmtTime(t)+' · уровень '+player.level+' · убийств '+kills;
    oover.classList.add('show');
    beep(200,0.15,'sawtooth',0.12);setTimeout(()=>beep(150,0.15,'sawtooth',0.12),120);setTimeout(()=>beep(100,0.25,'sawtooth',0.12),240);
  }

  function step(dt){
    t+=dt;
    // input
    let mx=0,my=0;
    if(keys.left||keys.a)mx-=1;if(keys.right||keys.d)mx+=1;
    if(keys.up||keys.w)my-=1;if(keys.down||keys.s)my+=1;
    if(joy.active){mx=joy.dx;my=joy.dy;}
    const len=Math.hypot(mx,my);
    if(len>0){mx/=Math.max(len,1);my/=Math.max(len,1);player.x+=mx*player.speed*dt;player.y+=my*player.speed*dt;player.facing={x:mx,y:my};}
    if(player.invuln>0)player.invuln-=dt;
    if(player.regen>0)player.hp=Math.min(player.maxHp,player.hp+player.regen*dt);

    // spawn
    const d=difficulty();
    spawnAcc+=dt*1000;
    if(spawnAcc>d.interval){spawnAcc=0;for(let i=0;i<d.count;i++)spawnEnemy(false);}
    if(t>=nextBossAt){spawnEnemy(true);nextBossAt+=45;}

    fire(dt);
    applyAura(dt);

    // enemies
    for(const e of enemies){
      const a=Math.atan2(player.y-e.y,player.x-e.x);
      e.x+=Math.cos(a)*e.speed*dt;e.y+=Math.sin(a)*e.speed*dt;
      if(dist(player,e)<player.r+e.r)hurtPlayer(e.dmg*dt*6);
    }
    enemies=enemies.filter(e=>{
      if(e.hp<=0){killEnemy(e);return false;}
      return true;
    });
    if(enemies.length>240)enemies.length=240;

    // projectiles
    for(const p of projectiles){
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
      for(const e of enemies){
        if(p.pierceLeft<0||p.hitSet.has(e))continue;
        if(dist(p,e)<p.r+e.r){e.hp-=p.dmg;p.hitSet.add(e);p.pierceLeft--;burst(p.x,p.y,'#4D96FF',3);}
      }
    }
    projectiles=projectiles.filter(p=>p.life>0&&p.pierceLeft>=0);

    // gems
    for(const g of gems){
      const dd=dist(player,g);
      if(dd<player.pickupRadius*2.2){const a=Math.atan2(player.y-g.y,player.x-g.x);const sp=260;g.x+=Math.cos(a)*sp*dt;g.y+=Math.sin(a)*sp*dt;}
      if(dd<player.r+g.r+4){grantXp(g.value);g.dead=true;beep(880,0.05,'sine',0.05);}
    }
    gems=gems.filter(g=>!g.dead);

    // particles / rings
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=dt/0.6;});
    particles=particles.filter(p=>p.life>0);
    rings.forEach(r=>{r.r+=r.maxR*dt*2;r.life-=dt;});
    rings=rings.filter(r=>r.life>0);

    if(camShake>0)camShake*=0.85;
    updateHud();
  }

  function drawGrid(camX,camY){
    x.strokeStyle='rgba(255,255,255,0.04)';x.lineWidth=1;const g=40;
    const ox=-((camX%g)+g)%g,oy=-((camY%g)+g)%g;
    for(let gx=ox;gx<W;gx+=g){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke();}
    for(let gy=oy;gy<H;gy+=g){x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke();}
  }

  function draw(){
    let sx=0,sy=0;
    if(camShake>0.3){sx=rand(-camShake,camShake);sy=rand(-camShake,camShake);}
    const camX=player.x-W/2,camY=player.y-H/2;
    x.clearRect(0,0,W,H);
    x.save();x.translate(sx,sy);
    drawGrid(camX,camY);
    // rings
    rings.forEach(r=>{x.globalAlpha=r.life*0.5;x.strokeStyle='#4D96FF';x.lineWidth=3;x.beginPath();x.arc(r.x-camX,r.y-camY,r.r,0,Math.PI*2);x.stroke();});
    x.globalAlpha=1;
    // gems
    gems.forEach(g=>{const gx=g.x-camX,gy=g.y-camY;x.save();x.translate(gx,gy);x.rotate(Math.PI/4);x.fillStyle='#4D96FF';x.shadowColor='#4D96FF';x.shadowBlur=8;x.fillRect(-g.r,-g.r,g.r*2,g.r*2);x.restore();});
    x.shadowBlur=0;
    // enemies
    enemies.forEach(e=>{
      const ex=e.x-camX,ey=e.y-camY;
      x.fillStyle=e.color;x.beginPath();x.arc(ex,ey,e.r,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(0,0,0,0.35)';x.beginPath();x.arc(ex,ey,e.r*0.5,0,Math.PI*2);x.fill();
      if(e.hp<e.maxHp){x.fillStyle='rgba(0,0,0,0.5)';x.fillRect(ex-e.r,ey-e.r-8,e.r*2,3);x.fillStyle='#4ade80';x.fillRect(ex-e.r,ey-e.r-8,e.r*2*Math.max(0,e.hp/e.maxHp),3);}
    });
    // projectiles
    projectiles.forEach(p=>{x.fillStyle='#7dd3fc';x.shadowColor='#7dd3fc';x.shadowBlur=6;x.beginPath();x.arc(p.x-camX,p.y-camY,p.r,0,Math.PI*2);x.fill();});
    x.shadowBlur=0;
    // particles
    particles.forEach(p=>{x.globalAlpha=Math.max(0,p.life);x.fillStyle=p.color;x.fillRect(p.x-camX-p.sz/2,p.y-camY-p.sz/2,p.sz,p.sz);});
    x.globalAlpha=1;
    // aura
    if(player.auraLevel){x.strokeStyle='rgba(77,150,255,0.25)';x.lineWidth=2;x.beginPath();x.arc(W/2,H/2,player.auraRadius,0,Math.PI*2);x.stroke();}
    // player
    x.globalAlpha=(player.invuln>0)?(Math.floor(t*20)%2?0.4:1):1;
    x.fillStyle='#e8ebf2';x.shadowColor='#4D96FF';x.shadowBlur=12;
    x.beginPath();x.arc(W/2,H/2,player.r,0,Math.PI*2);x.fill();x.shadowBlur=0;
    x.strokeStyle='#4D96FF';x.lineWidth=2;x.beginPath();x.moveTo(W/2,H/2);x.lineTo(W/2+player.facing.x*20,H/2+player.facing.y*20);x.stroke();
    x.globalAlpha=1;
    // joystick
    if(joy.active){x.strokeStyle='rgba(255,255,255,0.25)';x.lineWidth=2;x.beginPath();x.arc(joy.bx,joy.by,42,0,Math.PI*2);x.stroke();x.fillStyle='rgba(255,255,255,0.15)';x.beginPath();x.arc(joy.bx+joy.dx*42,joy.by+joy.dy*42,16,0,Math.PI*2);x.fill();}
    x.restore();
  }

  function loop(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(state==='running')step(dt);
    draw();
    if(state==='running')raf=requestAnimationFrame(loop);
  }

  function start(){
    ensureAudio();reset();
    ostart.classList.remove('show');oover.classList.remove('show');olevel.classList.remove('show');
    state='running';last=performance.now();raf=requestAnimationFrame(loop);
  }

  document.getElementById('btnStart').addEventListener('click',start);
  document.getElementById('btnRetry').addEventListener('click',start);

  const KEYMAP={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'a',d:'d',w:'w',s:'s',A:'a',D:'d',W:'w',S:'s'};
  document.addEventListener('keydown',e=>{const k=KEYMAP[e.key];if(k){keys[k]=true;e.preventDefault();}});
  document.addEventListener('keyup',e=>{const k=KEYMAP[e.key];if(k){keys[k]=false;e.preventDefault();}});

  function toCanvasXY(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*(cv.width/r.width),y:(e.clientY-r.top)*(cv.height/r.height)};}
  cv.addEventListener('pointerdown',e=>{if(state!=='running')return;const p=toCanvasXY(e);joy.active=true;joy.bx=p.x;joy.by=p.y;joy.dx=0;joy.dy=0;cv.setPointerCapture(e.pointerId);});
  cv.addEventListener('pointermove',e=>{if(!joy.active)return;const p=toCanvasXY(e);let dx=p.x-joy.bx,dy=p.y-joy.by;const d=Math.hypot(dx,dy),max=42;if(d>max){dx=dx/d*max;dy=dy/d*max;}joy.dx=dx/max;joy.dy=dy/max;});
  function endJoy(){joy.active=false;joy.dx=0;joy.dy=0;}
  cv.addEventListener('pointerup',endJoy);cv.addEventListener('pointercancel',endJoy);

  reset();draw();
})();
(function(){
  const bg=document.getElementById('bgfx'),bx=bg.getContext('2d');
  const COLORS=['#2DD4E8','#FFC94D','#B388FF','#66E39A','#FF6B6B','#4D96FF','#FFA24D','#4DD0C4','#F06BB0','#7BC96F','#A177E0'];
  let W,H,parts;
  function resize(){W=bg.width=innerWidth;H=bg.height=innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:1.5+Math.random()*2.5,vy:0.15+Math.random()*0.35,vx:(Math.random()-0.5)*0.15,col:COLORS[Math.floor(Math.random()*COLORS.length)],a:0.3+Math.random()*0.5,tw:Math.random()*Math.PI*2};}
  window.addEventListener('resize',resize);
  resize();parts=Array.from({length:80},mk);
  function loop(){
    const g=bx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0b0e17');g.addColorStop(1,'#05060a');
    bx.fillStyle=g;bx.fillRect(0,0,W,H);
    parts.forEach(p=>{p.y-=p.vy;p.x+=p.vx;p.tw+=0.02;if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;bx.globalAlpha=p.a*(0.6+0.4*Math.sin(p.tw));bx.fillStyle=p.col;bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fill();});
    bx.globalAlpha=1;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
