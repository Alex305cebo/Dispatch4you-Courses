<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.95" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="38" fill="url(#glow)"/>
  
  <!-- Modern truck icon -->
  <g transform="translate(50, 50)" filter="url(#shadow)">
    <!-- Trailer -->
    <rect x="-26" y="-10" width="26" height="20" rx="2.5" fill="url(#truck)" opacity="0.95"/>
    
    <!-- Trailer stripes -->
    <line x1="-20" y1="-8" x2="-20" y2="8" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="-12" y1="-8" x2="-12" y2="8" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="-4" y1="-8" x2="-4" y2="8" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    
    <!-- Cabin -->
    <path d="M 0 -12 L 0 10 L 18 10 L 18 -6 L 14 -12 Z" fill="url(#truck)"/>
    
    <!-- Window -->
    <rect x="9" y="-9" width="7" height="10" rx="1.5" fill="#0891b2" opacity="0.4"/>
    
    <!-- Headlight -->
    <circle cx="17" cy="2" r="1.5" fill="#fbbf24" opacity="0.9"/>
    
    <!-- Wheels -->
    <g>
      <circle cx="-16" cy="12" r="4" fill="#1e293b"/>
      <circle cx="-16" cy="12" r="2" fill="#475569"/>
      
      <circle cx="-4" cy="12" r="4" fill="#1e293b"/>
      <circle cx="-4" cy="12" r="2" fill="#475569"/>
      
      <circle cx="12" cy="12" r="4" fill="#1e293b"/>
      <circle cx="12" cy="12" r="2" fill="#475569"/>
    </g>
    
    <!-- Speed lines -->
    <g opacity="0.5">
      <line x1="-32" y1="-14" x2="-26" y2="-14" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-34" y1="-6" x2="-24" y2="-6" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-32" y1="2" x2="-28" y2="2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Accent badge -->
  <circle cx="78" cy="22" r="6" fill="#fbbf24"/>
  <text x="78" y="26" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0a1628" text-anchor="middle">D</text>
  
  <!-- Shine effect -->
  <circle cx="28" cy="24" r="12" fill="#ffffff" opacity="0.15"/>
</svg>
