<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <!-- Route line (дорога) -->
  <path d="M 15 45 Q 35 35, 50 40 T 85 35" 
        stroke="url(#routeGrad)" 
        stroke-width="3" 
        stroke-linecap="round"
        stroke-dasharray="5,3"
        fill="none"
        opacity="0.9"/>
  
  <!-- Truck body (кабина) -->
  <rect x="52" y="48" width="22" height="16" rx="2" fill="url(#truckGrad)" stroke="#0e7490" stroke-width="1.5"/>
  
  <!-- Truck cabin window -->
  <rect x="66" y="51" width="6" height="8" rx="1" fill="#1e3a5f" opacity="0.8"/>
  
  <!-- Truck trailer (прицеп) -->
  <rect x="26" y="50" width="28" height="14" rx="2" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  
  <!-- Trailer details (полосы) -->
  <line x1="32" y1="52" x2="32" y2="62" stroke="#94a3b8" stroke-width="1"/>
  <line x1="38" y1="52" x2="38" y2="62" stroke="#94a3b8" stroke-width="1"/>
  <line x1="44" y1="52" x2="44" y2="62" stroke="#94a3b8" stroke-width="1"/>
  <line x1="50" y1="52" x2="50" y2="62" stroke="#94a3b8" stroke-width="1"/>
  
  <!-- Wheels -->
  <circle cx="32" cy="66" r="5" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="32" cy="66" r="2.5" fill="#475569"/>
  
  <circle cx="48" cy="66" r="5" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="48" cy="66" r="2.5" fill="#475569"/>
  
  <circle cx="68" cy="66" r="5" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <circle cx="68" cy="66" r="2.5" fill="#475569"/>
  
  <!-- Headlight -->
  <circle cx="73" cy="58" r="1.5" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Location pin (точка назначения) -->
  <path d="M 82 28 C 82 24, 78 20, 74 20 C 70 20, 66 24, 66 28 C 66 32, 74 42, 74 42 C 74 42, 82 32, 82 28 Z" 
        fill="#ef4444" 
        stroke="#dc2626" 
        stroke-width="1"/>
  <circle cx="74" cy="28" r="3" fill="#fff" opacity="0.9"/>
  
  <!-- Dispatch headset icon (наушники диспетчера) -->
  <path d="M 18 28 Q 18 20, 26 20 Q 34 20, 34 28" 
        stroke="#06b6d4" 
        stroke-width="3" 
        stroke-linecap="round"
        fill="none"/>
  <rect x="16" y="26" width="4" height="6" rx="1" fill="#06b6d4"/>
  <rect x="32" y="26" width="4" height="6" rx="1" fill="#06b6d4"/>
  
  <!-- Shine effect -->
  <circle cx="30" cy="25" r="6" fill="#ffffff" opacity="0.1"/>
</svg>
