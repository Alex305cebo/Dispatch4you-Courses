<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#mainGrad)"/>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="40" fill="url(#glowGrad)"/>
  
  <!-- Modern truck silhouette -->
  <g transform="translate(50, 50)">
    <!-- Trailer -->
    <rect x="-28" y="-8" width="28" height="16" rx="2" fill="url(#lightGrad)" opacity="0.95"/>
    
    <!-- Cabin -->
    <path d="M 0 -10 L 0 6 L 16 6 L 16 -4 L 12 -10 Z" fill="url(#lightGrad)"/>
    
    <!-- Window -->
    <rect x="8" y="-7" width="6" height="8" rx="1" fill="#0891b2" opacity="0.5"/>
    
    <!-- Wheels -->
    <circle cx="-18" cy="8" r="3.5" fill="#1e293b"/>
    <circle cx="-18" cy="8" r="1.5" fill="#64748b"/>
    
    <circle cx="-6" cy="8" r="3.5" fill="#1e293b"/>
    <circle cx="-6" cy="8" r="1.5" fill="#64748b"/>
    
    <circle cx="10" cy="8" r="3.5" fill="#1e293b"/>
    <circle cx="10" cy="8" r="1.5" fill="#64748b"/>
    
    <!-- Speed lines -->
    <line x1="-32" y1="-12" x2="-24" y2="-12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-34" y1="-6" x2="-22" y2="-6" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-32" y1="0" x2="-26" y2="0" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
  
  <!-- Accent dot -->
  <circle cx="75" cy="25" r="4" fill="#fbbf24"/>
  <circle cx="75" cy="25" r="2" fill="#ffffff" opacity="0.8"/>
  
  <!-- Shine -->
  <circle cx="30" cy="25" r="10" fill="#ffffff" opacity="0.2"/>
</svg>
