<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- USA Map Icon -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="400" height="300" rx="20" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="3"/>
    <path d="M 50 150 L 100 100 L 150 120 L 200 80 L 250 100 L 300 90 L 350 120 L 350 250 L 50 250 Z" fill="rgba(6,182,212,0.3)" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="120" cy="130" r="8" fill="#f59e0b"/>
    <circle cx="180" cy="110" r="8" fill="#f59e0b"/>
    <circle cx="240" cy="95" r="8" fill="#f59e0b"/>
    <circle cx="300" cy="105" r="8" fill="#f59e0b"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="start">
    USA Map Trainer
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#06b6d4" text-anchor="start">
    Тренажёр географии США
  </text>
  
  <!-- Description -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" text-anchor="start">
    Изучай штаты и города в игровом формате
  </text>
  
  <!-- Features -->
  <g transform="translate(600, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#e2e8f0">
      🗺️ Интерактивная карта США
    </text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#e2e8f0">
      🎯 50 уровней сложности
    </text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#e2e8f0">
      🏆 Рейтинг и достижения
    </text>
  </g>
  
  <!-- Logo -->
  <g transform="translate(100, 520)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#06b6d4">
      Dispatch4You.com
    </text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#64748b">
      Курсы Диспетчера Грузоперевозок
    </text>
  </g>
</svg>
