<!DOCTYPE html>
<html lang="ru" style="background:#070b14">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=202604241702">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | Курсы Диспетчера</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #06b6d4;
      --secondary: #0ea5e9;
      --accent: #f97316;
      --bg-darker: #070b14;
      --bg-dark: #0a0e1a;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    html { overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-darker);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(6,182,212,0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(249,115,22,0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    .code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #06b6d4, #0ea5e9, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 8px 24px rgba(6,182,212,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(6,182,212,0.45);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-3px);
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 2px;
      margin: 24px auto;
    }

    .links {
      margin-top: 40px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .link-chip:hover {
      background: rgba(6,182,212,0.1);
      border-color: rgba(6,182,212,0.3);
      color: var(--primary);
    }

    @media (max-width: 480px) {
      .buttons { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
      .code { letter-spacing: -2px; }
    }

    @media (max-width: 360px) {
      .links { flex-direction: column; align-items: center; }
      .link-chip { width: 100%; max-width: 260px; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <span class="icon">🚛</span>
    <h1>Груз не найден</h1>
    <p>Похоже, этот маршрут не существует или страница была перемещена. Проверьте адрес или вернитесь на главную.</p>
    <div class="divider"></div>
    <div class="buttons">
      <a href="/index.html" class="btn btn-primary">🏠 На главную</a>
      <a href="javascript:history.back()" class="btn btn-secondary">← Назад</a>
    </div>
    <div class="links">
      <a href="/pages/modules-index.html" class="link-chip">📚 Модули</a>
      <a href="/pages/ai-broker-chat.html" class="link-chip">🎯 Симулятор</a>
      <a href="/pages/dispatcher-cards.html" class="link-chip">🃏 Карточки</a>
      <a href="/pages/documentation.html" class="link-chip">📖 Документация</a>
      <a href="/about.html" class="link-chip">ℹ️ О нас</a>
    </div>
  </div>
</body>
</html>
