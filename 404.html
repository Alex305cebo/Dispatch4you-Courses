<!DOCTYPE html>
<html lang="ru" style="background:#050810">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | Курсы Диспетчера</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #06b6d4;
      --secondary: #0ea5e9;
      --accent: #f97316;
      --bg: #050810;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --border: rgba(255,255,255,0.08);
    }

    html { overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* фоновое видео — планета из космоса */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* лёгкое затемнение снизу для читаемости текста и кнопок */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(180deg, rgba(5,8,16,.15) 0%, rgba(5,8,16,.15) 55%, rgba(5,8,16,.75) 100%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 20vh;
    }

    .lead {
      font-weight: 300;
      color: rgba(255,255,255,.8);
      font-size: clamp(15px, 2.4vw, 22px);
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .lead.b { margin-bottom: 28px; }

    .code {
      font-size: clamp(90px, 18vw, 200px);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      letter-spacing: -4px;
      text-shadow: 0 0 80px rgba(6,182,212,.45), 0 0 160px rgba(6,182,212,.2);
      margin-bottom: 8px;
    }

    .icon { font-size: 40px; display: block; margin-bottom: 20px; }

    p.sub {
      max-width: 480px;
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* liquid-glass кнопка */
    .btn-glass {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 100px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 1px rgba(255,255,255,.15);
      transition: transform .25s ease, background .25s ease;
      overflow: hidden;
    }
    .btn-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,.5) 0%, rgba(255,255,255,.15) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,.15) 80%, rgba(255,255,255,.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .btn-glass:hover { transform: translateY(-3px); background: rgba(255,255,255,.08); }

    .links {
      margin-top: 28px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 560px;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all .2s ease;
    }

    .link-chip:hover {
      background: rgba(6,182,212,.1);
      border-color: rgba(6,182,212,.3);
      color: var(--primary);
    }

    @media (max-width: 480px) {
      .code { letter-spacing: -2px; }
      .links { flex-direction: column; align-items: center; }
      .link-chip { width: 100%; max-width: 260px; justify-content: center; }
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline poster="/assets/video/404-planet-poster.jpg">
    <source src="/assets/video/404-planet-web.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <div class="content">
    <div class="lead">Похоже, этот груз</div>
    <div class="lead b">свернул не туда :/</div>

    <div class="code">404</div>
    <span class="icon">🚛</span>

    <p class="sub">Такой страницы не существует или она была перемещена. Проверьте адрес или вернитесь на главную.</p>

    <a href="/index.html" class="btn-glass">🏠 На главную</a>

    <div class="links">
      <a href="/pages/modules-index.html" class="link-chip">📚 Модули</a>
      <a href="/pages/ai-broker-chat.html" class="link-chip">🎯 Симулятор</a>
      <a href="/pages/dispatcher-cards.html" class="link-chip">🃏 Карточки</a>
      <a href="/pages/documentation.html" class="link-chip">📖 Документация</a>
      <a href="/about.html" class="link-chip">ℹ️ О нас</a>
    </div>
  </div>
</body>
</html>
