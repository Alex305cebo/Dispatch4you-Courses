<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Проверка доступа | Курсы Диспетчера</title>
<style>
  body { margin:0; background:#050a12; color:#e2e8f0;
         font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; }
  .spin { width:36px; height:36px; border:3px solid rgba(6,182,212,0.2);
          border-top-color:#06b6d4; border-radius:50%; animation:rg-s .8s linear infinite; }
  @keyframes rg-s { to { transform:rotate(360deg); } }
  .card { max-width:440px; width:100%; text-align:center; border-radius:24px; padding:36px 32px;
          background:linear-gradient(135deg,rgba(15,23,42,.99),rgba(20,30,55,.99));
          box-shadow:0 25px 80px rgba(0,0,0,.7); }
  .card--login { max-width:420px; border:1.5px solid rgba(6,182,212,.25); }
  .card--pay   { border:1.5px solid rgba(245,158,11,.3); }
  .ic { font-size:44px; margin-bottom:12px; }
  h2 { font-size:22px; font-weight:800; color:#fff; margin:0 0 6px; }
  p  { font-size:13px; color:#94a3b8; margin:0 0 20px; }
  .btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
         padding:13px; border:none; border-radius:12px; background:#fff; color:#1f2937;
         font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; margin-bottom:10px; }
  .lnk { display:block; padding:11px; border-radius:12px; text-decoration:none;
         background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
         color:#94a3b8; font-size:13px; font-weight:600; margin-bottom:10px; }
  .lnk--pay { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff;
              border:none; padding:14px; font-size:15px; font-weight:700; margin-bottom:10px; }
  .home { font-size:12px; color:#475569; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap" id="w"><div class="spin"></div></div>

<script>window.__D4Y_GATE_MODE = "{{MODE}}";</script>
<script type="module">
// Страница-загрузчик гейта. Показывается ВМЕСТО контента модуля, пока доступ
// не подтверждён. Контента здесь нет — в этом весь смысл: сервер не отправляет
// HTML модуля, пока не увидит подписанную куку.
//
// mode="check"  — куки нет. Человек, скорее всего, залогинен, но токен лежит в
//                 SDK и с обычной навигацией не уходит. Берём токен, отдаём в
//                 session.php, получаем куку, перезагружаемся — и PHP отдаёт модуль.
// mode="denied" — кука есть, роль не подходит. Проверка уже состоялась,
//                 перезагрузка не поможет: показываем пейволл сразу.

import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';

const w = document.getElementById('w');

const GOOGLE_SVG = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

function showLogin() {
  w.innerHTML = `<div class="card card--login">
    <div class="ic">🔐</div>
    <h2>Войдите для доступа</h2>
    <p>Бесплатная регистрация — один клик</p>
    <button class="btn" id="g">${GOOGLE_SVG}Войти через Google</button>
    <a class="lnk" href="/login.html">✉️ Войти через Email</a>
    <a class="home" href="/index.html">🏠 На главную</a>
  </div>`;
  document.getElementById('g').onclick = signIn;
}

function showPaywall() {
  w.innerHTML = `<div class="card card--pay">
    <div class="ic">⭐</div>
    <h2>Контент для студентов</h2>
    <p>Этот материал доступен только студентам курса.</p>
    <a class="lnk lnk--pay" href="/pricing.html">🚀 Оформить подписку</a>
    <a class="lnk" href="/index.html">🏠 На главную</a>
  </div>`;
}

function showError(msg) {
  w.innerHTML = `<div class="card card--login">
    <div class="ic">⚠️</div>
    <h2>Не удалось проверить доступ</h2>
    <p>${msg}</p>
    <button class="btn" id="r" style="background:rgba(255,255,255,.08);color:#e2e8f0">Попробовать снова</button>
    <a class="home" href="/index.html">🏠 На главную</a>
  </div>`;
  document.getElementById('r').onclick = () => location.reload();
}

async function signIn() {
  const { GoogleAuthProvider, signInWithPopup } = await import('https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js');
  const p = new GoogleAuthProvider();
  p.setCustomParameters({ prompt: 'select_account' });
  try { await signInWithPopup(auth, p); } catch (e) { showError('Вход не удался. Попробуйте ещё раз.'); }
}

// Обмениваем токен на куку и перезагружаемся. Ровно один раз за попытку:
// если после перезагрузки доступа всё ещё нет, PHP пришлёт mode="denied"
// и мы покажем пейволл — бесконечного цикла перезагрузок не будет.
async function exchange(user) {
  try {
    const idToken = await user.getIdToken();
    const r = await fetch('/api/session.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken })
    });
    if (!r.ok) { showError('Сервер не подтвердил доступ. Напишите нам на info@dispatch4you.com'); return; }
    location.reload();
  } catch (e) {
    showError('Нет связи с сервером. Проверьте интернет и попробуйте снова.');
  }
}

const cfg = { apiKey: 'AIzaSyC505dhT1WjUPhXbinqLvEOTlEXWxYy8GI', authDomain: 'dispatch4you.com', projectId: 'dispatch4you-80e0f' };
const app = getApps().length ? getApps()[0] : initializeApp(cfg);
const auth = getAuth(app);

if (window.__D4Y_GATE_MODE === 'denied') {
  showPaywall();
} else {
  onAuthStateChanged(auth, (user) => {
    if (user) exchange(user);
    else showLogin();
  });
  // Firebase молчит дольше 12 с — сеть или блокировщик. Показываем вход, а не
  // вечный спиннер: пусть человек хотя бы видит, что делать.
  setTimeout(() => { if (w.querySelector('.spin')) showLogin(); }, 12000);
}
</script>
</body>
</html>
