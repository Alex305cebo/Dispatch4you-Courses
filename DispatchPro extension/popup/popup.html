<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #1e293b; color: #e2e8f0; margin: 0; }
    .tabs { display: flex; background: #0f172a; }
    .tab { flex: 1; padding: 9px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 12px; border-bottom: 2px solid transparent; }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .panel { display: none; padding: 14px; }
    .panel.active { display: block; }
    label { display: block; color: #94a3b8; margin: 8px 0 3px; font-size: 12px; }
    input, textarea { width: 100%; box-sizing: border-box; background: #334155; border: 1px solid #475569; color: #e2e8f0; border-radius: 4px; padding: 6px 8px; font-size: 12px; }
    textarea { height: 160px; resize: vertical; font-family: monospace; }
    button.save { width: 100%; margin-top: 12px; padding: 8px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    button.save:hover { background: #2563eb; }
    .calc-result { margin-top: 12px; font-size: 20px; font-weight: 700; text-align: center; }
    .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="settings">Settings</div>
    <div class="tab" data-tab="template">Template</div>
    <div class="tab" data-tab="calc">RPM Calc</div>
  </div>

  <div id="settings" class="panel active">
    <label>Company Name</label><input id="companyName">
    <label>Dispatcher Name</label><input id="dispatcherName">
    <label>Phone</label><input id="companyPhone">
    <label>MC#</label><input id="mcNumber">
    <label>Minimum RPM ($)</label><input id="minRpm" type="number" step="0.1" value="2.0">
    <button class="save" id="saveSettings">Save Settings</button>
  </div>

  <div id="template" class="panel">
    <p class="hint">Variables: {{origin}} {{dest}} {{rate}} {{rpm}} {{miles}} {{broker_email}} {{mc}} {{ref_id}} {{company_name}} {{dispatcher_name}} {{company_phone}}</p>
    <textarea id="emailTemplate"></textarea>
    <button class="save" id="saveTemplate">Save Template</button>
  </div>

  <div id="calc" class="panel">
    <label>Rate ($)</label><input id="calcRate" type="number" placeholder="1800">
    <label>Miles</label><input id="calcMiles" type="number" placeholder="533">
    <label>Fuel Cost ($, optional)</label><input id="calcFuel" type="number" placeholder="0">
    <div class="calc-result" id="calcResult">—</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
