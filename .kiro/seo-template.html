<!-- 
  SEO ШАБЛОН для новых страниц
  Скопируйте этот блок в <head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest"> каждой новой страницы
  Замените [PLACEHOLDERS] на реальные значения
-->

<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Title: 50-60 символов, включая бренд -->
  <title>[Заголовок страницы] | Курсы Диспетчера</title>
  
  <!-- Description: 150-160 символов с ключевыми словами -->
  <meta name="description" content="[Краткое описание страницы с призывом к действию]">
  
  <!-- Keywords (опционально) -->
  <meta name="keywords" content="диспетчер, грузоперевозки, курсы, обучение, США, [дополнительные ключевые слова]">
  
  <!-- Canonical URL - предотвращает дубли -->
  <link rel="canonical" href="https://dispatch4you.com/[путь-к-странице].html">
  
  <!-- Open Graph для Facebook, LinkedIn -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dispatch4you.com/[путь-к-странице].html">
  <meta property="og:title" content="[Заголовок для соцсетей - может отличаться от title]">
  <meta property="og:description" content="[Описание для соцсетей - 2-3 предложения]">
  <meta property="og:image" content="https://dispatch4you.com/og-image.png">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:site_name" content="Dispatch4You">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="[Заголовок для Twitter]">
  <meta name="twitter:description" content="[Описание для Twitter]">
  <meta name="twitter:image" content="https://dispatch4you.com/og-image.png">
  
  <!-- Favicon -->
  
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  <!-- Preconnect для ускорения загрузки -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  
  <!-- Firebase Auth (если нужна авторизация) -->
  <script type="module" src="/firebase-auth-init.js?v=4.0"></script>
  
  <!-- Структурированные данные (Schema.org) - опционально -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "[Название страницы]",
    "description": "[Описание страницы]",
    "url": "https://dispatch4you.com/[путь-к-странице].html",
    "inLanguage": "ru-RU",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Dispatch4You",
      "url": "https://dispatch4you.com"
    }
  }
  </script>
  
  <!-- Хлебные крошки (для внутренних страниц) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Главная",
        "item": "https://dispatch4you.com"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "[Название раздела]",
        "item": "https://dispatch4you.com/[путь-к-разделу]"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "[Название страницы]",
        "item": "https://dispatch4you.com/[путь-к-странице].html"
      }
    ]
  }
  </script>
</head>

<!-- 
  ВАЖНО: После создания страницы
  1. Добавьте URL в sitemap.xml
  2. Проверьте уникальность title и description
  3. Убедитесь что H1 соответствует title
  4. Добавьте внутренние ссылки с других страниц
  5. Оптимизируйте изображения (WebP, alt-теги, lazy loading)
-->
