<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Галерея анимированных эмодзи</title>
<style>
  body{margin:0;background:#0b0e17;color:#e8ebf2;font-family:system-ui,sans-serif;padding:16px;}
  h1{font-size:20px;margin:6px 0 2px;}
  p.sub{color:#8891a3;font-size:13px;margin:0 0 18px;}
  h2{font-size:15px;color:#4D96FF;margin:22px 0 10px;border-bottom:1px solid #293042;padding-bottom:6px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
  .cell{background:#121724;border:1px solid #293042;border-radius:12px;padding:10px 6px;text-align:center;}
  .cell img{width:64px;height:64px;display:block;margin:0 auto 6px;}
  .cell span{font-size:10px;color:#8891a3;word-break:break-all;}
  footer{margin-top:26px;font-size:11px;color:#565f70;line-height:1.5;}
</style>
</head>
<body>
<h1>🎬 Анимированные эмодзи — кандидаты для игры</h1>
<p class="sub">Все двигаются вживую. Скажи, какие берём для мобов, героя и наград.</p>
<div id="root"></div>
<footer>Animated emoji by Google — Noto Animated Emoji, лицензия CC BY 4.0 (коммерческое использование разрешено с указанием авторства).</footer>
<script>
const G='https://fonts.gstatic.com/s/e/notoemoji/latest/';
const SECTIONS=[
 ['🕷 Мобы (враги)',[
  ['spider','1f577'],['snake','1f40d'],['bat','1f987'],['scorpion','1f982'],
  ['bug','1f41b'],['lady_beetle','1f41e'],['butterfly','1f98b'],['microbe','1f9a0'],
  ['ghost','1f47b'],['skull','1f480'],['alien','1f47d'],['alien_monster','1f47e'],
  ['ogre','1f479'],['t_rex','1f996'],['dragon','1f409'],['angry','1f621'],['exploding_head','1f92f']]],
 ['✈️ Герой / техника',[
  ['airplane','2708'],['rocket','1f680'],['flying_saucer','1f6f8'],['sunglasses_face','1f60e'],['partying_face','1f973']]],
 ['💥 Эффекты / оружие',[
  ['fire','1f525'],['collision','1f4a5'],['bomb','1f4a3'],['high_voltage','26a1'],
  ['sparkles','2728'],['tornado','1f32a_fe0f'],['comet','2604_fe0f'],['snowflake','2744_fe0f']]],
 ['🏆 Награды / пикапы',[
  ['crown','1f451'],['gem_stone','1f48e'],['trophy','1f3c6'],['red_heart','2764_fe0f']]],
];
const root=document.getElementById('root');
SECTIONS.forEach(([title,items])=>{
  const h=document.createElement('h2');h.textContent=title;root.appendChild(h);
  const g=document.createElement('div');g.className='grid';
  items.forEach(([name,cp])=>{
    const c=document.createElement('div');c.className='cell';
    c.innerHTML='<img loading="lazy" src="'+G+cp+'/512.webp" alt="'+name+'"><span>'+name+'</span>';
    g.appendChild(c);
  });
  root.appendChild(g);
});
</script>
</body>
</html>
