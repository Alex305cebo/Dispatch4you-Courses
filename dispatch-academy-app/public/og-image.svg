<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1b3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="250" fill="#0ea5e9" opacity="0.06" filter="url(#blur)"/>
  <circle cx="1000" cy="480" r="300" fill="#06b6d4" opacity="0.05" filter="url(#blur)"/>
  <circle cx="600" cy="315" r="350" fill="#0284c7" opacity="0.04" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Logo / Icon area -->
  <circle cx="150" cy="220" r="56" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="2"/>
  <text x="150" y="238" font-size="52" text-anchor="middle" dominant-baseline="middle">🎓</text>

  <!-- Main title -->
  <text x="220" y="198" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1" filter="url(#glow-filter)">Dispatch Academy</text>

  <!-- Subtitle line -->
  <text x="220" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Профессиональное обучение диспетчеров</text>

  <!-- Divider -->
  <rect x="220" y="278" width="680" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>

  <!-- Description -->
  <text x="220" y="322" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#cbd5e1" font-weight="300">
    Интерактивная платформа обучения диспетчеров
  </text>
  <text x="220" y="356" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#cbd5e1" font-weight="300">
    грузоперевозок США — от нуля до профессионала
  </text>

  <!-- Feature pills -->
  <rect x="220" y="400" width="198" height="42" rx="21" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>
  <text x="319" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#38bdf8" text-anchor="middle" font-weight="600">📚 Курсы</text>

  <rect x="436" y="400" width="210" height="42" rx="21" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>
  <text x="541" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#38bdf8" text-anchor="middle" font-weight="600">🗺️ Карта рейсов</text>

  <rect x="664" y="400" width="198" height="42" rx="21" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>
  <text x="763" y="426" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#38bdf8" text-anchor="middle" font-weight="600">🎮 Игра</text>

  <!-- Bottom section -->
  <rect x="220" y="490" width="760" height="80" rx="12" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.15)" stroke-width="1"/>
  <text x="600" y="527" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#64748b" text-anchor="middle">Перейти на платформу</text>
  <text x="600" y="552" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#38bdf8" text-anchor="middle" font-weight="600">dispatch4you.com/dispatch-academy-app</text>

  <!-- Right side decoration - truck icon area -->
  <g opacity="0.15" transform="translate(960, 240)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#06b6d4" stroke-width="0.5"/>
  </g>
  <text x="960" y="270" font-size="90" text-anchor="middle" dominant-baseline="middle" opacity="0.2">🚛</text>

  <!-- Dispatch4You brand mark -->
  <text x="600" y="600" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle" font-weight="500">Dispatch4You · dispatch4you.com</text>
</svg>
