<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мини-игры</title>
<style>
  :root{--bg1:#0b0e17;--bg2:#05060a;--panel:#121724;--panel2:#1a2130;--border:#293042;--text:#e8ebf2;--muted:#8891a3;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:linear-gradient(160deg,var(--bg1),var(--bg2));overflow:hidden;}
  body{color:var(--text);font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;}
  #menu{display:flex;flex-direction:column;align-items:center;gap:28px;padding:20px;width:100%;max-width:520px;}
  h1{font-size:22px;font-weight:500;margin:0;}
  .games{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;}
  .card{flex:1 1 200px;max-width:220px;background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:20px 16px;cursor:pointer;color:var(--text);text-align:center;transition:border-color .15s,transform .15s;}
  .card:hover{border-color:#4D96FF;transform:translateY(-2px);}
  .swatch{width:64px;height:64px;margin:0 auto 14px;border-radius:10px;}
  .t1{background:#2DD4E8;}.t2{background:#FFC94D;position:relative;top:14px;left:14px;width:40px;height:40px;}
  .tetris-swatch{position:relative;width:64px;height:64px;margin:0 auto 14px;}
  .tetris-swatch div{position:absolute;width:22px;height:22px;border-radius:4px;}
  .surv-swatch{width:64px;height:64px;margin:0 auto 14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FF6B6B,#7f1d1d);}
  .emoji-swatch{width:64px;height:64px;margin:0 auto 14px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:36px;}
  .card .title{font-size:16px;font-weight:500;margin-bottom:4px;}
  .card .desc{font-size:12px;color:var(--muted);}
  #frame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;}
  #back{display:none;position:fixed;bottom:12px;left:12px;z-index:1000;padding:10px 16px;font-size:14px;
    background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;pointer-events:auto;opacity:0.85;}
  #back:hover{opacity:1;}
  #back:hover{background:#242c3a;}
  #home{position:fixed;top:12px;right:12px;z-index:1000;padding:8px 14px;font-size:13px;
    background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;
    text-decoration:none;opacity:0.85;}
  #home:hover{opacity:1;background:#242c3a;}
</style>
</head>
<body>
<a id="home" href="https://dispatch4you.com/">← На сайт</a>
<div id="menu">
  <h1>Выбери игру</h1>
  <div class="games">
    <div class="card" data-src="tetris.html">
      <div class="tetris-swatch">
        <div style="left:8px;top:0;background:#2DD4E8;"></div>
        <div style="left:30px;top:0;background:#2DD4E8;"></div>
        <div style="left:8px;top:22px;background:#B388FF;"></div>
        <div style="left:30px;top:22px;background:#FFC94D;"></div>
      </div>
      <div class="title">Тетрис</div>
      <div class="desc">Классика с бомбами, ядом и призраками</div>
    </div>
    <div class="card" data-src="survivors/index.html">
      <div class="surv-swatch"></div>
      <div class="title">Выжившие</div>
      <div class="desc">Survivors-style выживание</div>
    </div>
    <div class="card" data-href="https://dispatch4you.com/game/">
      <div class="emoji-swatch">🎮</div>
      <div class="title">Dispatch Office</div>
      <div class="desc">Симулятор работы диспетчера</div>
    </div>
    <div class="card" data-href="https://dispatch4you.com/dispatch-academy-app/">
      <div class="emoji-swatch">🚛</div>
      <div class="title">Dispatch: Career Path</div>
      <div class="desc">Карьера диспетчера — игра-обучение</div>
    </div>
  </div>
</div>
<iframe id="frame"></iframe>
<button id="back">← Меню</button>
<script>
(function(){
  // old free-hosting routes (htmlpreview.github.io / githack.com proxying raw.githubusercontent.com) are retired —
  // bounce anyone still on one of those links to the real GitHub Pages site
  if(location.hostname==='htmlpreview.github.io'||location.hostname.endsWith('githack.com')){
    location.replace('https://alex305cebo.github.io/Dispatch4you-Courses/');
    return;
  }
  const menu=document.getElementById('menu'),frame=document.getElementById('frame'),back=document.getElementById('back');
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      // Полноценные приложения (Dispatch Office, Career Path) открываем прямым переходом,
      // а не в iframe — им нужен весь экран и свои роуты
      if(card.dataset.href){ location.href=card.dataset.href; return; }
      frame.src=card.dataset.src;
      menu.style.display='none';
      frame.style.display='block';
      // у «Выживших» есть своя кнопка «☰ Меню» — наша снизу слева дублировала бы её
      back.style.display=card.dataset.src.indexOf('survivors')===0?'none':'block';
    });
  });
  back.addEventListener('click',()=>{
    frame.style.display='none';
    frame.src='about:blank';
    back.style.display='none';
    menu.style.display='flex';
  });
})();
</script>
</body>
</html>
