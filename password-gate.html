<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Сайт в разработке</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(20px);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: #64748b;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        input[type="password"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 16px;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #94a3b8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 26px;
            }

            .lock-icon {
                font-size: 52px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1>Сайт в разработке</h1>
        <p class="subtitle">Введите пароль для доступа к платформе обучения диспетчеров</p>

        <form id="passwordForm">
            <div class="form-group">
                <label for="password">Пароль доступа</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль..." autocomplete="off"
                    required>
            </div>

            <button type="submit" class="btn-submit">
                🚀 Войти на сайт
            </button>

            <div class="error-message" id="errorMessage">
                ❌ Неверный пароль. Попробуйте еще раз.
            </div>
        </form>

        <div class="footer-note">
            💡 Для получения пароля свяжитесь с администратором
        </div>
    </div>

    <script>
        // Пароль для доступа (можно изменить)
        const SITE_PASSWORD = 'dev2026';
        const ACCESS_KEY = 'site_access_granted';

        // Проверка при загрузке
        if (localStorage.getItem(ACCESS_KEY) === 'true') {
            window.location.href = 'index.html';
        }

        // Обработка формы
        document.getElementById('passwordForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password === SITE_PASSWORD) {
                // Сохраняем доступ
                localStorage.setItem(ACCESS_KEY, 'true');

                // Анимация успеха
                document.querySelector('.container').style.transform = 'scale(0.95)';
                document.querySelector('.container').style.opacity = '0';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 300);
            } else {
                // Показываем ошибку
                errorMessage.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();

                // Скрываем ошибку через 3 секунды
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });

        // Автофокус на поле пароля
        document.getElementById('password').focus();
    </script>
</body>

</html>
