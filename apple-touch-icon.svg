<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appleTruckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appleRouteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners for iOS -->
  <rect width="180" height="180" rx="40" fill="url(#appleBgGrad)"/>
  
  <!-- Route line -->
  <path d="M 30 80 Q 65 65, 90 75 T 150 65" 
        stroke="url(#appleRouteGrad)" 
        stroke-width="5" 
        stroke-linecap="round"
        stroke-dasharray="8,5"
        fill="none"
        opacity="0.9"/>
  
  <!-- Truck trailer -->
  <rect x="50" y="90" width="50" height="25" rx="3" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2.5"/>
  
  <!-- Trailer details -->
  <line x1="60" y1="94" x2="60" y2="111" stroke="#94a3b8" stroke-width="2"/>
  <line x1="70" y1="94" x2="70" y2="111" stroke="#94a3b8" stroke-width="2"/>
  <line x1="80" y1="94" x2="80" y2="111" stroke="#94a3b8" stroke-width="2"/>
  <line x1="90" y1="94" x2="90" y2="111" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Truck cabin -->
  <rect x="100" y="87" width="40" height="28" rx="3" fill="url(#appleTruckGrad)" stroke="#0e7490" stroke-width="2.5"/>
  
  <!-- Cabin window -->
  <rect x="120" y="92" width="14" height="14" rx="2" fill="#1e3a5f" opacity="0.8"/>
  
  <!-- Wheels -->
  <circle cx="60" cy="118" r="9" fill="#1e293b" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="60" cy="118" r="4.5" fill="#475569"/>
  
  <circle cx="90" cy="118" r="9" fill="#1e293b" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="90" cy="118" r="4.5" fill="#475569"/>
  
  <circle cx="125" cy="118" r="9" fill="#1e293b" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="125" cy="118" r="4.5" fill="#475569"/>
  
  <!-- Headlight -->
  <circle cx="137" cy="105" r="3" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Location pin -->
  <path d="M 148 50 C 148 43, 142 37, 135 37 C 128 37, 122 43, 122 50 C 122 57, 135 75, 135 75 C 135 75, 148 57, 148 50 Z" 
        fill="#ef4444" 
        stroke="#dc2626" 
        stroke-width="2"/>
  <circle cx="135" cy="50" r="5" fill="#fff" opacity="0.9"/>
  
  <!-- Dispatch headset -->
  <path d="M 35 50 Q 35 37, 48 37 Q 61 37, 61 50" 
        stroke="#06b6d4" 
        stroke-width="5" 
        stroke-linecap="round"
        fill="none"/>
  <rect x="32" y="47" width="7" height="11" rx="2" fill="#06b6d4"/>
  <rect x="58" y="47" width="7" height="11" rx="2" fill="#06b6d4"/>
  
  <!-- Text label -->
  <text x="90" y="155" font-family="'Montserrat', sans-serif" font-size="16" font-weight="800" fill="#06b6d4" text-anchor="middle" letter-spacing="1">
    DISPATCH
  </text>
  
  <!-- Shine effect -->
  <circle cx="55" cy="45" r="12" fill="#ffffff" opacity="0.08"/>
</svg>
