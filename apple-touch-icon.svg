<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aTruck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.95" />
    </linearGradient>
    <radialGradient id="aGlow">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="aShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with iOS rounded corners -->
  <rect width="180" height="180" rx="40" fill="url(#aBg)"/>
  
  <!-- Glow effects -->
  <circle cx="90" cy="90" r="75" fill="url(#aGlow)"/>
  <circle cx="90" cy="90" r="70" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  
  <!-- Main truck icon -->
  <g transform="translate(90, 90)" filter="url(#aShadow)">
    <!-- Trailer -->
    <rect x="-48" y="-18" width="48" height="36" rx="4" fill="url(#aTruck)" opacity="0.95"/>
    
    <!-- Trailer stripes -->
    <line x1="-38" y1="-14" x2="-38" y2="14" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
    <line x1="-24" y1="-14" x2="-24" y2="14" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
    <line x1="-10" y1="-14" x2="-10" y2="14" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
    
    <!-- Cabin -->
    <path d="M 0 -22 L 0 18 L 32 18 L 32 -10 L 26 -22 Z" fill="url(#aTruck)"/>
    
    <!-- Window -->
    <rect x="16" y="-16" width="12" height="18" rx="2" fill="#0891b2" opacity="0.4"/>
    
    <!-- Headlight -->
    <circle cx="30" cy="4" r="3" fill="#fbbf24" opacity="0.9"/>
    
    <!-- Wheels -->
    <g>
      <circle cx="-30" cy="22" r="7" fill="#1e293b"/>
      <circle cx="-30" cy="22" r="3.5" fill="#475569"/>
      
      <circle cx="-8" cy="22" r="7" fill="#1e293b"/>
      <circle cx="-8" cy="22" r="3.5" fill="#475569"/>
      
      <circle cx="22" cy="22" r="7" fill="#1e293b"/>
      <circle cx="22" cy="22" r="3.5" fill="#475569"/>
    </g>
    
    <!-- Speed lines -->
    <g opacity="0.5">
      <line x1="-58" y1="-24" x2="-48" y2="-24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-62" y1="-10" x2="-46" y2="-10" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-58" y1="4" x2="-50" y2="4" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Badge with "D" -->
  <circle cx="140" cy="40" r="12" fill="#fbbf24"/>
  <text x="140" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0a1628" text-anchor="middle">D</text>
  
  <!-- Text label -->
  <text x="90" y="160" 
        font-family="'Montserrat', sans-serif" 
        font-size="14" 
        font-weight="800" 
        fill="#ffffff" 
        opacity="0.7"
        text-anchor="middle" 
        letter-spacing="3">
    DISPATCH
  </text>
  
  <!-- Shine effects -->
  <circle cx="50" cy="45" r="20" fill="#ffffff" opacity="0.12"/>
  <circle cx="60" cy="55" r="10" fill="#ffffff" opacity="0.08"/>
</svg>
