<!DOCTYPE html>
<html lang="ru" style="background:#070b14">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Курсы Диспетчера</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#06b6d4;--accent:#f97316;--bg:#070b14;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.1)}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(circle at 25% 40%,rgba(6,182,212,.12),transparent 55%),
                radial-gradient(circle at 75% 70%,rgba(249,115,22,.1),transparent 55%)}

    .wrap{position:relative;z-index:1;width:100%;max-width:420px}

    /* CARD */
    .card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:44px 40px;backdrop-filter:blur(20px)}

    /* LOGO */
    .logo{text-align:center;margin-bottom:36px}
    .logo-icon{font-size:52px;display:block;margin-bottom:10px}
    .logo-name{font-size:22px;font-weight:800;background:linear-gradient(135deg,#06b6d4,#0ea5e9,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* TITLE */
    .title{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px}
    .sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:32px}

    /* GOOGLE BTN — главная кнопка */
    .btn-google{
      width:100%;padding:15px;background:#fff;border:none;border-radius:14px;
      color:#1f2937;font-size:15px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit;
      position:relative;overflow:hidden
    }
    .btn-google:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.35)}
    .btn-google:active{transform:translateY(-1px)}
    .btn-google:disabled{opacity:.7;cursor:not-allowed;transform:none}
    .btn-google .spinner{width:18px;height:18px;border:2px solid #ddd;border-top-color:#4285F4;border-radius:50%;animation:spin .6s linear infinite;display:none}
    .btn-google.loading .spinner{display:block}
    .btn-google.loading .g-logo{display:none}
    .btn-google.loading .g-text{opacity:.7}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* DIVIDER */
    .divider{display:flex;align-items:center;gap:12px;margin:24px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
    .divider span{font-size:12px;color:#475569;white-space:nowrap}

    /* EMAIL FORM */
    .email-section{display:none}
    .email-section.open{display:block}

    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#e2e8f0}
    input[type=email],input[type=password],input[type=text]{
      width:100%;padding:13px 14px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);border-radius:12px;
      color:#fff;font-family:'Inter',sans-serif;font-size:14px;transition:all .2s
    }
    input:focus{outline:none;border-color:var(--primary);background:rgba(6,182,212,.08);box-shadow:0 0 0 3px rgba(6,182,212,.12)}
    input::placeholder{color:#475569}

    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#475569;font-size:18px;padding:4px;transition:color .2s}
    .pw-toggle:hover{color:#94a3b8}

    .forgot{text-align:right;margin-bottom:18px}
    .forgot a{color:var(--primary);font-size:13px;font-weight:600;text-decoration:none}
    .forgot a:hover{text-decoration:underline}

    .btn-email{
      width:100%;padding:14px;background:linear-gradient(135deg,#06b6d4,#0ea5e9);
      color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;
      cursor:pointer;transition:all .25s;font-family:inherit
    }
    .btn-email:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,.35)}
    .btn-email:disabled{opacity:.6;cursor:not-allowed;transform:none}

    /* TOGGLE EMAIL */
    .toggle-email{
      width:100%;padding:12px;background:transparent;
      border:1px solid rgba(255,255,255,.1);border-radius:12px;
      color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;
      transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px
    }
    .toggle-email:hover{border-color:rgba(255,255,255,.2);color:#e2e8f0;background:rgba(255,255,255,.04)}

    /* MESSAGES */
    .msg{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
    .msg.info{background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);color:#67e8f9}
    .msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}

    /* BOTTOM */
    .bottom{text-align:center;margin-top:24px;color:#64748b;font-size:14px}
    .bottom a{color:var(--primary);font-weight:700;text-decoration:none}
    .bottom a:hover{text-decoration:underline}
    .back{text-align:center;margin-top:12px}
    .back a{color:#475569;font-size:13px;text-decoration:none;transition:color .2s}
    .back a:hover{color:#94a3b8}

    @media(max-width:480px){
      .card{padding:32px 24px;border-radius:24px}
      .title{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="logo">
        <span class="logo-icon">🚛</span>
        <span class="logo-name">Курсы Диспетчера</span>
      </div>

      <h1 class="title">Добро пожаловать</h1>
      <p class="sub">Войдите чтобы продолжить обучение</p>

      <div class="msg error" id="msgError"></div>
      <div class="msg info"  id="msgInfo"></div>
      <div class="msg success" id="msgSuccess"></div>

      <!-- GOOGLE — главная кнопка -->
      <button class="btn-google" id="googleBtn">
        <div class="spinner"></div>
        <svg class="g-logo" width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span class="g-text">Продолжить с Google</span>
      </button>

      <div style="margin-top:14px;padding:10px 14px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:12px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:14px;flex-shrink:0;">🔒</span>
        <p style="font-size:12px;color:#6ee7b7;line-height:1.5;margin:0;">
          Пароли не хранятся. Вход через Google — безопасно и без регистрации.
        </p>
      </div>

      <div class="divider"><span>или войдите с паролем</span></div>

      <!-- TOGGLE EMAIL FORM -->
      <button class="toggle-email" id="toggleEmailBtn" onclick="toggleEmail()">
        ✉️ Войти через Email
      </button>

      <!-- EMAIL FORM — скрыт по умолчанию -->
      <div class="email-section" id="emailSection">
        <form id="loginForm" style="margin-top:16px">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" id="pwToggle" title="Показать пароль">👁</button>
            </div>
          </div>
          <div class="forgot"><a href="#" id="forgotLink">Забыли пароль?</a></div>
          <button type="submit" class="btn-email" id="submitBtn">Войти</button>
        </form>
      </div>

      <div class="bottom">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
      <div class="back"><a href="index.html">← На главную</a></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, signInWithPopup,
      signInWithRedirect, getRedirectResult,
      GoogleAuthProvider, sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyC505dhT1WjUPhXbinqLvEOTlEXWxYy8GI",
      authDomain: "dispatch4you-80e0f.firebaseapp.com",
      projectId: "dispatch4you-80e0f",
      storageBucket: "dispatch4you-80e0f.appspot.com",
      messagingSenderId: "349235354473",
      appId: "1:349235354473:web:488aeb29211b02bb153bf8"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const gProvider = new GoogleAuthProvider();
    gProvider.setCustomParameters({ prompt: 'select_account' });

    const msgError   = document.getElementById('msgError');
    const msgInfo    = document.getElementById('msgInfo');
    const msgSuccess = document.getElementById('msgSuccess');

    function showMsg(el, text) {
      [msgError, msgInfo, msgSuccess].forEach(m => { m.style.display = 'none'; m.innerHTML = ''; });
      el.innerHTML = text;
      el.style.display = 'block';
    }

    const ERRORS = {
      'auth/user-not-found':    '❌ Аккаунт не найден. Проверьте email.',
      'auth/wrong-password':    '❌ Неверный пароль.',
      'auth/invalid-credential':'❌ Неверный email или пароль.',
      'auth/invalid-email':     '❌ Неверный формат email.',
      'auth/too-many-requests': '⏳ Слишком много попыток. Подождите немного.',
      'auth/network-request-failed': '🌐 Ошибка сети. Проверьте интернет.',
      'auth/popup-blocked':     '🚫 Браузер заблокировал popup.',
      'auth/account-exists-with-different-credential': '⚠️ Этот email уже используется другим способом входа.',
    };
    const err = code => ERRORS[code] || '❌ Ошибка: ' + code;

    async function saveAndRedirect(user) {
      const parts = (user.displayName || '').trim().split(' ');
      const firstName = parts[0] || user.email.split('@')[0];
      const lastName  = parts.slice(1).join(' ') || '';
      localStorage.setItem('user', JSON.stringify({ uid: user.uid, firstName, lastName, email: user.email, photoURL: user.photoURL || '' }));
      try {
        await setDoc(doc(db, 'users', user.uid), {
          uid: user.uid, firstName, lastName, email: user.email,
          photoURL: user.photoURL || '', lastLogin: serverTimestamp(),
          provider: user.providerData[0]?.providerId || 'unknown'
        }, { merge: true });
        const snap = await getDoc(doc(db, 'users', user.uid));
        localStorage.setItem('user_role', snap.exists() ? (snap.data().accessRole || 'registered') : 'registered');
      } catch(e) { localStorage.setItem('user_role', 'registered'); }
      const ret = localStorage.getItem('returnUrl');
      localStorage.removeItem('returnUrl');
      window.location.href = ret || 'dashboard.html?welcome=1';
    }

    // Redirect result on load
    getRedirectResult(auth).then(r => { if (r?.user) saveAndRedirect(r.user); }).catch(() => {});

    // Google
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      try {
        const r = await signInWithPopup(auth, gProvider);
        await saveAndRedirect(r.user);
      } catch(e) {
        btn.classList.remove('loading');
        btn.disabled = false;
        if (e.code === 'auth/popup-blocked') {
          showMsg(msgError, '⚠️ Попап заблокирован браузером. Разрешите всплывающие окна для этого сайта и попробуйте снова.');
        } else if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
          showMsg(msgError, err(e.code));
        }
      }
    });

    // Email/Password
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('password').value;
      const btn   = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Входим...';
      try {
        const r = await signInWithEmailAndPassword(auth, email, pwd);
        await saveAndRedirect(r.user);
      } catch(e) {
        showMsg(msgError, err(e.code));
        btn.disabled = false; btn.textContent = 'Войти';
      }
    });

    // Forgot password
    document.getElementById('forgotLink').addEventListener('click', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg(msgError, '✉️ Введите email выше.'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showMsg(msgSuccess, '✅ Письмо отправлено на ' + email);
      } catch(e) { showMsg(msgError, err(e.code)); }
    });

    // Password toggle
    document.getElementById('pwToggle').addEventListener('click', function() {
      const inp = document.getElementById('password');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
    });
  </script>

  <script>
    function toggleEmail() {
      const sec = document.getElementById('emailSection');
      const btn = document.getElementById('toggleEmailBtn');
      const open = sec.classList.toggle('open');
      btn.textContent = open ? '✕ Скрыть форму' : '✉️ Войти через Email';
    }
  </script>
</body>
</html>
