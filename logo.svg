<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="logoTruckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon part (truck with route) -->
  <g transform="translate(5, 10)">
    <!-- Route line -->
    <path d="M 2 20 Q 12 15, 20 18 T 35 15" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"
          stroke-dasharray="3,2"
          fill="none"
          opacity="0.8"/>
    
    <!-- Truck trailer -->
    <rect x="8" y="22" width="16" height="10" rx="1.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="12" y1="24" x2="12" y2="30" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="16" y1="24" x2="16" y2="30" stroke="#94a3b8" stroke-width="0.8"/>
    <line x1="20" y1="24" x2="20" y2="30" stroke="#94a3b8" stroke-width="0.8"/>
    
    <!-- Truck cabin -->
    <rect x="24" y="21" width="13" height="11" rx="1.5" fill="url(#logoTruckGrad)" stroke="#0e7490" stroke-width="1"/>
    <rect x="32" y="23" width="4" height="5" rx="0.5" fill="#1e3a5f" opacity="0.7"/>
    
    <!-- Wheels -->
    <circle cx="13" cy="34" r="3" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
    <circle cx="13" cy="34" r="1.5" fill="#475569"/>
    
    <circle cx="24" cy="34" r="3" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
    <circle cx="24" cy="34" r="1.5" fill="#475569"/>
    
    <circle cx="33" cy="34" r="3" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
    <circle cx="33" cy="34" r="1.5" fill="#475569"/>
    
    <!-- Headlight -->
    <circle cx="36" cy="27" r="1" fill="#fbbf24"/>
  </g>
  
  <!-- Text: DISPATCH4YOU -->
  <text x="50" y="28" font-family="'Montserrat', sans-serif" font-size="18" font-weight="800" fill="url(#logoTextGrad)" letter-spacing="0.5">
    DISPATCH
  </text>
  <text x="50" y="45" font-family="'Montserrat', sans-serif" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="1">
    TRAINING USA
  </text>
  
  <!-- Accent line -->
  <line x1="50" y1="32" x2="195" y2="32" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
</svg>
