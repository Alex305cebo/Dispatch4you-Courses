<!DOCTYPE html>
<html lang="ru">
<head>
  
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        #map {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .status {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
        }
        .success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: #34d399;
        }
        .error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
        }
        .loading {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 24px;
            font-weight: 900;
        }
        .info {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>🗺️ Google Maps API Test</h1>
    
    <div id="status" class="status loading">
        ⏳ Загрузка Google Maps API...
    </div>

    <div id="map"></div>

    <script>
        const API_KEY = 'AIzaSyDmtGk4ivDi5nxKtLNok4WfZdIZa886EmI';
        const statusEl = document.getElementById('status');

        // Функция инициализации карты
        function initMap() {
            console.log('✅ Google Maps API загружен успешно!');
            
            try {
                // Создаём карту с центром на США
                const map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 39.8283, lng: -98.5795 }, // Центр США
                    zoom: 5,
                    mapTypeId: 'roadmap',
                });

                // Добавляем маркер
                new google.maps.Marker({
                    position: { lat: 39.8283, lng: -98.5795 },
                    map: map,
                    title: 'Центр США',
                });

                statusEl.className = 'status success';
                statusEl.innerHTML = `
                    ✅ Google Maps API работает отлично!
                    <div class="info">API Key: ${API_KEY.substring(0, 10)}...</div>
                    <div class="info">Карта загружена и готова к использованию</div>
                `;
            } catch (error) {
                console.error('❌ Ошибка при создании карты:', error);
                statusEl.className = 'status error';
                statusEl.innerHTML = `
                    ❌ Ошибка при создании карты: ${error.message}
                    <div class="info">Проверьте консоль браузера (F12) для подробностей</div>
                `;
            }
        }

        // Обработка ошибок загрузки
        window.gm_authFailure = function() {
            console.error('❌ Ошибка авторизации Google Maps API');
            statusEl.className = 'status error';
            statusEl.innerHTML = `
                ❌ Ошибка авторизации API ключа
                <div class="info">Возможные причины:</div>
                <div class="info">• API ключ неверный или истёк</div>
                <div class="info">• Maps JavaScript API не включен в Google Cloud Console</div>
                <div class="info">• Ограничения API ключа блокируют этот домен</div>
            `;
        };

        // Загружаем скрипт Google Maps
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=initMap&libraries=geometry`;
        script.async = true;
        script.defer = true;
        
        script.onerror = function(error) {
            console.error('❌ Ошибка загрузки скрипта Google Maps:', error);
            statusEl.className = 'status error';
            statusEl.innerHTML = `
                ❌ Не удалось загрузить Google Maps API
                <div class="info">Проверьте подключение к интернету</div>
                <div class="info">Откройте консоль браузера (F12) для подробностей</div>
            `;
        };

        document.head.appendChild(script);
        console.log('📡 Скрипт Google Maps добавлен в DOM');
    </script>
</body>
</html>
