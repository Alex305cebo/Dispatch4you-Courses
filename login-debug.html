<!DOCTYPE html>
<html lang="ru" style="background:#070b14">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }

        .log {
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff00;
            border-radius: 5px;
        }

        .error {
            color: #ff0000;
            border-color: #ff0000;
        }

        .success {
            color: #00ff00;
        }
    </style>
</head>

<body>
    <h1>🔍 Login Page Diagnostics</h1>
    <div id="logs"></div>

    <script>
        const logs = document.getElementById('logs');

        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : ' success');
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            logs.appendChild(div);
            console.log(msg);
        }

        log('✅ HTML loaded');
        log('✅ JavaScript executing');

        // Test Firebase SDK loading
        log('📦 Loading Firebase SDK...');

        import('https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js')
            .then(() => {
                log('✅ Firebase App SDK loaded');
                return import('https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js');
            })
            .then(() => {
                log('✅ Firebase Auth SDK loaded');
                log('🎉 All Firebase SDKs loaded successfully!');
                log('');
                log('🔧 Проблема НЕ в загрузке Firebase');
                log('🔧 Проверь Firebase Console → Authentication → Settings → Authorized domains');
                log('🔧 Должен быть добавлен: dispatch4you.com');
            })
            .catch((err) => {
                log('❌ Firebase SDK loading error: ' + err.message, true);
                log('❌ Проблема с загрузкой Firebase SDK', true);
            });

        // Test DOM
        window.addEventListener('DOMContentLoaded', () => {
            log('✅ DOM loaded');
        });

        // Test errors
        window.addEventListener('error', (e) => {
            log('❌ Global error: ' + e.message, true);
        });

        // Test unhandled promise rejections
        window.addEventListener('unhandledrejection', (e) => {
            log('❌ Unhandled promise rejection: ' + e.reason, true);
        });
    </script>
</body>

</html>
