<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="simpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#simpleGrad)"/>
  
  <!-- Letter "D" with modern style -->
  <g filter="url(#glow)">
    <path d="M 30 25 L 30 75 L 50 75 Q 75 75, 75 50 Q 75 25, 50 25 Z" 
          fill="url(#letterGrad)" 
          stroke="#ffffff" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- Inner detail -->
    <path d="M 38 35 L 38 65 L 50 65 Q 65 65, 65 50 Q 65 35, 50 35 Z" 
          fill="none" 
          stroke="#06b6d4" 
          stroke-width="1.5"
          opacity="0.4"/>
  </g>
  
  <!-- Small accent - truck wheels -->
  <g transform="translate(68, 68)">
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <circle cx="10" cy="0" r="4" fill="#fbbf24"/>
    <circle cx="0" cy="0" r="1.5" fill="#1e293b"/>
    <circle cx="10" cy="0" r="1.5" fill="#1e293b"/>
  </g>
  
  <!-- Shine -->
  <circle cx="35" cy="30" r="8" fill="#ffffff" opacity="0.25"/>
</svg>
